<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>つたえる君 外部通訳</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --bg: #010605;
      --panel: #071612;
      --panel-soft: #0b211b;
      --text: #f7fffc;
      --muted: #a9c8bf;
      --main: #28d7c3;
      --main-dark: #12a99a;
      --line: rgba(40, 215, 195, 0.34);
      --line-strong: #28d7c3;
      --accent: #8fb3ff;
      --danger: #ff7890;
      --warning: #ffd166;
      --radius: 28px;
      --radius-small: 18px;
      --page-padding: 16px;
    }

    * {
      box-sizing: border-box;
      touch-action: manipulation;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      height: 100vh;
      height: 100dvh;
      padding: var(--page-padding);
      overflow: hidden;
    }

    button,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
    }

    .app {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 14px;
      width: min(1120px, 100%);
      height: calc(100vh - (var(--page-padding) * 2));
      height: calc(100dvh - (var(--page-padding) * 2));
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 54px;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      margin: 0;
      font-size: clamp(1.1rem, 5vw, 1.55rem);
      font-weight: 900;
      letter-spacing: 0;
    }

    .title i {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      min-width: 44px;
      color: #002a25;
      background: var(--main);
      border-radius: 16px;
      box-shadow: 0 16px 40px rgba(40, 215, 195, 0.16);
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-height: 34px;
      color: var(--main);
      border-bottom: 1px solid var(--line);
      padding: 6px 0;
      font-size: 0.9rem;
      font-weight: 800;
      text-align: right;
    }

    .status.is-error {
      color: var(--danger);
      border-bottom-color: rgba(255, 120, 144, 0.62);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 12px;
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .direction-row {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .direction-button {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 68px;
      padding: 12px;
      color: var(--text);
      background: var(--panel-soft);
      border: 1px solid rgba(143, 179, 255, 0.34);
      border-radius: 20px;
      text-align: left;
    }

    .direction-button i {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      min-width: 42px;
      color: #002a25;
      background: rgba(40, 215, 195, 0.92);
      border-radius: 15px;
    }

    .direction-button strong {
      display: block;
      font-size: 1rem;
      line-height: 1.3;
    }

    .direction-button small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-weight: 800;
    }

    .direction-button.is-active {
      background: rgba(40, 215, 195, 0.14);
      border-color: var(--main);
      box-shadow: inset 0 0 0 1px var(--main);
    }

    .field {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .field span {
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 900;
    }

    .select {
      width: 100%;
      min-height: 52px;
      color: var(--text);
      background: #010d0b;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 0 14px;
      outline: none;
      font-size: 16px;
      font-weight: 800;
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 14px;
      min-height: 0;
      padding-bottom: 82px;
    }

    .panel {
      min-width: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .input-panel {
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      min-height: 0;
      height: 100%;
    }

    .text-wrap {
      position: relative;
      min-height: 0;
      height: 100%;
    }

    textarea {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 0;
      resize: none;
      color: var(--text);
      background: #020a08;
      border: 0;
      outline: none;
      padding: 20px;
      font-size: clamp(1.08rem, 3.6vw, 1.55rem);
      line-height: 1.75;
    }

    textarea::placeholder {
      color: rgba(247, 255, 252, 0.48);
    }

    .input-actions {
      position: fixed;
      left: 50%;
      bottom: calc(var(--page-padding) + env(safe-area-inset-bottom));
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: min(1120px, calc(100% - (var(--page-padding) * 2)));
      padding: 10px;
      transform: translateX(-50%);
      background: rgba(1, 6, 5, 0.96);
      border: 1px solid rgba(40, 215, 195, 0.28);
      border-radius: 999px;
      box-shadow: 0 -18px 48px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(14px);
    }

    .left-actions,
    .right-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .right-actions {
      flex: 1 1 auto;
      justify-content: flex-end;
      margin-left: auto;
    }

    .icon-button,
    .main-button,
    .sub-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      min-height: 46px;
      border-radius: 999px;
      font-weight: 900;
    }

    .icon-button {
      width: 52px;
      min-width: 52px;
      padding: 0;
      color: #002a25;
      background: var(--main);
      font-size: 1.25rem;
    }

    .icon-button.is-listening {
      background: var(--danger);
      color: #270006;
    }

    .main-button {
      min-width: 180px;
      padding: 0 22px;
      color: #002a25;
      background: var(--main);
      font-size: 1rem;
    }

    .main-button:disabled {
      cursor: not-allowed;
      color: rgba(247, 255, 252, 0.42);
      background: rgba(247, 255, 252, 0.13);
      border: 1px solid rgba(247, 255, 252, 0.14);
      box-shadow: none;
    }

    .sub-button {
      padding: 0 16px;
      color: var(--main);
      background: rgba(40, 215, 195, 0.08);
      border: 1px solid var(--line);
    }

    .sub-button:disabled {
      color: rgba(247, 255, 252, 0.38);
      background: rgba(247, 255, 252, 0.08);
      border-color: rgba(247, 255, 252, 0.14);
      box-shadow: none;
    }

    .results {
      display: none;
    }

    .result-empty {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
    }

    .result-card {
      display: grid;
      gap: 10px;
      padding: 14px;
      background: #020a08;
      border: 1px solid rgba(40, 215, 195, 0.28);
      border-radius: 20px;
    }

    .result-set {
      position: relative;
      display: grid;
      gap: 12px;
      padding: 18px;
      background: rgba(7, 22, 18, 0.94);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 18px 54px rgba(0, 0, 0, 0.24);
      animation: slideResultIn 0.28s ease both;
      transition: transform 0.24s ease, opacity 0.24s ease;
    }

    .result-set.is-pending {
      border-style: dashed;
      background: rgba(40, 215, 195, 0.06);
    }

    .result-set.is-error {
      border-color: rgba(255, 120, 144, 0.62);
      background: rgba(255, 120, 144, 0.07);
    }

    @keyframes slideResultIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-number {
      position: absolute;
      top: 14px;
      left: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      height: 30px;
      color: #002a25;
      background: var(--main);
      border-radius: 999px;
      font-weight: 1000;
    }

    .result-set-title {
      margin: 0 0 2px 56px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 900;
    }

    .result-card.is-primary {
      border-color: rgba(40, 215, 195, 0.72);
      background: rgba(40, 215, 195, 0.09);
    }

    .result-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .result-head strong {
      font-size: 0.95rem;
      color: var(--text);
    }

    .result-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: min(420px, 46vw);
    }

    .result-mini-button {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      color: var(--main);
      background: rgba(40, 215, 195, 0.08);
      border: 1px solid var(--line);
      border-radius: 50%;
      font-size: 1rem;
    }

    .result-mini-button.is-playing {
      color: #002a25;
      background: var(--main);
    }

    .result-show-button,
    .result-retry-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 40px;
      padding: 0 13px;
      color: #002a25;
      background: var(--main);
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 1000;
      white-space: nowrap;
    }

    .result-retry-button {
      color: var(--danger);
      background: rgba(255, 120, 144, 0.1);
      border: 1px solid rgba(255, 120, 144, 0.54);
    }

    .speech-slider {
      flex: 1 1 auto;
      min-width: 80px;
      accent-color: var(--main);
    }

    .result-text {
      margin: 0;
      color: var(--text);
      font-size: clamp(1rem, 2.8vw, 1.22rem);
      line-height: 1.75;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .speech-token {
      border-radius: 0.35em;
      transition: background-color 0.12s ease, color 0.12s ease;
    }

    .speech-token.is-speaking {
      color: #001f1b;
      background: linear-gradient(135deg, rgba(40, 215, 195, 0.9), rgba(143, 179, 255, 0.72));
      box-shadow: 0 0 0 0.12em rgba(40, 215, 195, 0.16);
    }

    .is-loading-text {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .translation-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      padding: 14px;
      padding-bottom: calc(14px + env(safe-area-inset-bottom));
      background: rgba(1, 6, 5, 0.96);
    }

    .translation-modal[hidden] {
      display: none;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 4px 14px;
      border-bottom: 1px solid var(--line);
    }

    .modal-title {
      margin: 0;
      font-size: clamp(1rem, 4vw, 1.35rem);
      font-weight: 1000;
    }

    .modal-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .order-toggle {
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      min-width: min(320px, 58vw);
      padding: 4px;
      background: #020a08;
      border: 1px solid var(--line);
      border-radius: 999px;
    }

    .order-toggle button {
      min-height: 38px;
      color: var(--muted);
      background: transparent;
      border-radius: 999px;
      font-weight: 900;
    }

    .show-modal {
      position: fixed;
      inset: 0;
      z-index: 70;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 16px;
      padding: clamp(16px, 4vw, 36px);
      padding-bottom: calc(clamp(16px, 4vw, 36px) + env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at top left, rgba(40, 215, 195, 0.18), transparent 36%),
        #010605;
    }

    .show-modal[hidden] {
      display: none;
    }

    .show-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .show-title {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      color: var(--main);
      font-size: clamp(1rem, 4vw, 1.4rem);
      font-weight: 1000;
    }

    .show-body {
      display: grid;
      align-content: center;
      gap: 20px;
      min-height: 0;
      padding: clamp(22px, 5vw, 54px);
      background: rgba(7, 22, 18, 0.9);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.34);
    }

    .show-text {
      margin: 0;
      color: var(--text);
      font-size: clamp(2rem, 8vw, 5.2rem);
      font-weight: 900;
      line-height: 1.5;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .show-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }

    .order-toggle button.is-active {
      color: #002a25;
      background: var(--main);
    }

    .modal-close {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      min-width: 44px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
      border-radius: 50%;
      font-size: 1.2rem;
    }

    .modal-results {
      display: grid;
      align-content: start;
      gap: 14px;
      padding: 16px 2px 4px;
      overflow: auto;
    }

    .modal-loading {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--main);
      font-weight: 900;
    }

    @media (max-width: 820px) {
      body {
        padding: 10px;
      }

      .app {
        height: calc(100dvh - 20px);
      }

      .toolbar {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        padding: 10px;
        border-radius: 22px;
      }

      .direction-row {
        gap: 8px;
      }

      .direction-button {
        min-height: 62px;
        padding: 9px;
      }

      .direction-button i {
        width: 38px;
        height: 38px;
        min-width: 38px;
      }

      .main-grid {
        grid-template-columns: 1fr;
      }

      .field span {
        font-size: 0.78rem;
      }

      .select {
        min-height: 48px;
        padding-inline: 10px;
        font-size: 16px;
      }

      .input-panel {
        min-height: 0;
      }

      .input-actions {
        bottom: calc(10px + env(safe-area-inset-bottom));
        align-items: center;
        flex-direction: row;
        width: calc(100% - 20px);
        padding: 8px;
      }

      .left-actions,
      .right-actions {
        margin-left: 0;
      }

      .left-actions {
        width: auto;
      }

      .right-actions {
        flex: 1 1 auto;
        justify-content: space-between;
      }

      .main-button {
        flex: 1 1 auto;
      }

      .sub-button {
        flex: 0 0 auto;
        padding-inline: 16px;
      }

      .right-actions .main-button {
        width: auto;
        min-width: 0;
      }

      .result-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .result-actions {
        width: 100%;
        min-width: 0;
        flex-wrap: wrap;
      }

      .modal-head {
        align-items: stretch;
        flex-direction: column;
      }

      .modal-actions {
        width: 100%;
      }

      .order-toggle {
        flex: 1 1 auto;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1 class="title">
        <i class="fa-solid fa-language" aria-hidden="true"></i>
        <span>つたえる君（通訳）</span>
      </h1>
      <div class="status" id="status">準備できました。</div>
    </header>

    <section class="toolbar" aria-label="通訳設定">
      <div class="direction-row">
        <button class="direction-button is-active" type="button" id="teacher-direction" data-direction="teacher-to-parent">
          <i class="fa-solid fa-chalkboard-user" aria-hidden="true"></i>
          <span>
            <strong>先生から</strong>
            <small>保護者への説明に</small>
          </span>
        </button>
        <button class="direction-button" type="button" id="parent-direction" data-direction="parent-to-teacher">
          <i class="fa-solid fa-earth-asia" aria-hidden="true"></i>
          <span>
            <strong>保護者から</strong>
            <small>先生に伝える</small>
          </span>
        </button>
      </div>

      <label class="field">
        <span>入力する言語</span>
        <select class="select" id="source-lang"></select>
      </label>

      <label class="field">
        <span>翻訳する言語</span>
        <select class="select" id="target-lang"></select>
      </label>
    </section>

    <section class="main-grid">
      <section class="panel input-panel" aria-label="入力">
        <div class="text-wrap">
          <textarea id="source-text" maxlength="900" placeholder="右下のマイクを押して、短い文で話してください。入力された文を確認して翻訳します。"></textarea>
        </div>
        <div class="input-actions">
          <div class="left-actions">
            <button class="icon-button" type="button" id="mic-button" aria-label="マイク開始">
              <i class="fa-solid fa-microphone" aria-hidden="true"></i>
            </button>
          </div>
          <div class="right-actions">
            <button class="main-button" type="button" id="translate-button">
              <i class="fa-solid fa-language" aria-hidden="true"></i>
              <span>翻訳する</span>
            </button>
            <button class="sub-button" type="button" id="clear-button">
              <i class="fa-regular fa-trash-can" aria-hidden="true"></i>
              <span>消す</span>
            </button>
          </div>
        </div>
      </section>

      <aside class="panel results" id="results" aria-live="polite">
        <p class="result-empty">翻訳結果がここに表示されます。</p>
      </aside>
    </section>
  </main>

  <section class="translation-modal" id="translation-modal" aria-labelledby="translation-modal-title" aria-modal="true" role="dialog" hidden>
    <header class="modal-head">
      <h2 class="modal-title" id="translation-modal-title">翻訳結果</h2>
      <div class="modal-actions">
        <div class="order-toggle" aria-label="翻訳結果の並び順">
          <button class="is-active" type="button" id="order-newest">最新順</button>
          <button type="button" id="order-oldest">最初から</button>
        </div>
        <button class="modal-close" type="button" id="translation-modal-close" aria-label="閉じる">
          <i class="fa-solid fa-xmark" aria-hidden="true"></i>
        </button>
      </div>
    </header>
    <div class="modal-results" id="modal-results" aria-live="polite"></div>
  </section>

  <section class="show-modal" id="show-modal" aria-labelledby="show-modal-title" aria-modal="true" role="dialog" hidden>
    <header class="show-head">
      <h2 class="show-title" id="show-modal-title">
        <i class="fa-solid fa-display" aria-hidden="true"></i>
        <span id="show-modal-label">相手に見せる</span>
      </h2>
      <button class="modal-close" type="button" id="show-modal-close" aria-label="閉じる">
        <i class="fa-solid fa-xmark" aria-hidden="true"></i>
      </button>
    </header>
    <div class="show-body">
      <p class="show-text" id="show-modal-text"></p>
      <div class="show-actions">
        <button class="result-mini-button" type="button" id="show-modal-speak" aria-label="読み上げ">
          <i class="fa-solid fa-volume-high" aria-hidden="true"></i>
        </button>
      </div>
    </div>
  </section>

  <script>
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzBSH540vZK4G62twUfsketq9Pi2RZFocmfcNFwdEVV-IPqHH1Izb0VAFW_SRtN4nbf/exec';
    const STORAGE_PREFIX = 'tsutaeru_external_interpreter_';
    const params = new URLSearchParams(location.search);
    const languages = [
      { code: 'ja', label: 'JP 日本語', speech: 'ja-JP' },
      { code: 'pt', label: 'BR ポルトガル語', speech: 'pt-BR' },
      { code: 'en', label: 'US 英語', speech: 'en-US' },
      { code: 'es', label: 'ES スペイン語', speech: 'es-ES' },
      { code: 'vi', label: 'VN ベトナム語', speech: 'vi-VN' },
      { code: 'zh', label: 'CN 中国語', speech: 'zh-CN' },

    ];

    let direction = params.get('direction') || localStorage.getItem(STORAGE_PREFIX + 'direction') || 'teacher-to-parent';
    let recognition = null;
    let listening = false;
    let baseTranscript = '';
    let translationHistory = [];

    let speechState = {
      utterance: null,
      cardId: '',
      text: '',
      lang: '',
      offset: 0,
      started: false,
      paused: false
    };
    let isTranslating = false;

    const sourceSelect = document.getElementById('source-lang');
    const targetSelect = document.getElementById('target-lang');
    const sourceText = document.getElementById('source-text');
    const micButton = document.getElementById('mic-button');
    const clearButton = document.getElementById('clear-button');

    const showModalClose = document.getElementById('show-modal-close');
    const showModalText = document.getElementById('show-modal-text');
    const showModalLabel = document.getElementById('show-modal-label');
    const showModalSpeak = document.getElementById('show-modal-speak');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const SCHOOL_TEXT_FIXES = [
      ['復讐', '復習'],
      ['溶けた人', '解けた人'],
      ['解けた人は先生に店に来て', '解けた人は先生に見せに来て'],
      ['先生に店に来て', '先生に見せに来て'],
      ['教科書を開きましょう', '教科書を開きましょう。'],
      ['問いの位置', '問1'],
      ['問の位置', '問1'],
      ['かっこ 1番', '1番'],
      ['かっこ 2番', '2番'],
      ['かっこ 3番', '3番'],
      ['かっこ 4番', '4番'],
      ['かっこ 5番', '5番'],
      ['かっこ 6番', '6番'],
      ['丸をもらった', '丸をつけてもらった'],
      ['答えではなくヒントを上げて', '答えではなくヒントをあげて']
    ];

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function normalizeText(value) {
      return String(value || '')
        .replace(/[\u00a0\u3000]/g, ' ')
        .replace(/\s+/g, ' ')
        .replace(/([ぁ-んァ-ヶ一-龠々ー])\s+(?=[ぁ-んァ-ヶ一-龠々ー])/g, '$1')
        .replace(/([ぁ-んァ-ヶ一-龠々ー])\s+(?=[、。！？!?])/g, '$1')
        .replace(/([、。！？!?])\s+(?=[ぁ-んァ-ヶ一-龠々ー])/g, '$1')
        .trim();
    }

    function prepareTextForTranslation(value) {
      let text = normalizeText(value);

      SCHOOL_TEXT_FIXES.forEach(([from, to]) => {
        text = text.split(from).join(to);
      });

      return addSpeechPunctuation(text)
        .replace(/([。！？!?]){2,}/g, '$1')
        .replace(/^。+/, '')
        .trim();
    }

    function addSpeechPunctuation(value) {
      let text = normalizeText(value);

      if (!text) return '';

      SCHOOL_TEXT_FIXES.forEach(([from, to]) => {
        text = text.split(from).join(to);
      });

      text = text
        .replace(/^(おはようございます|こんにちは|こんばんは)(?=(これから|今日は|さて|では|それでは|まず|前回|教科書|授業))/g, '$1。')
        .replace(/([^。！？!?])(?=(それでは|では|さて|まず|次に|続いて|最後に|前回|今回|今日は|これから|時間は|答えは|ヒントは|質問|できた人|解けた人|終わった人))/g, '$1。')
        .replace(/(ですか|ますか|でしょうか|ありますか|いますか|できましたか|わかりましたか|覚えていますか|よいですか|いいですか|何ですか|どこですか|どうですか|どれですか|いつですか)(?![。！？!?])/g, '$1？')
        .replace(/(してください|して下さい|しましょう|ましょう|始めます|終わります|開いてください|書いてください|読んでください|解きましょう|確認しましょう|見せに来てください|持ってきましょう|持ってきてください|話してください|発表してください|待ってください)(?![。！？!?])/g, '$1。')
        .replace(/。([。！？!?])/g, '$1')
        .replace(/？[。！？!?]+/g, '？')
        .replace(/！[。！？!?]+/g, '！')
        .replace(/([。！？!?]){2,}/g, '$1')
        .replace(/^。+/, '');

      return normalizeText(text);
    }

    function getLanguage(code) {
      return languages.find((language) => language.code === code) || languages[0];
    }

    function getSpeechCode(code) {
      return getLanguage(code).speech;
    }

    function setStatus(message, isError) {
      statusEl.textContent = message || '';
      statusEl.classList.toggle('is-error', Boolean(isError));
    }

    function cssEscapeValue(value) {
      if (window.CSS && typeof CSS.escape === 'function') {
        return CSS.escape(value);
      }

      return String(value || '').replace(/["\\]/g, '\\$&');
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function updateTranslateButtonState() {
      const hasText = normalizeText(sourceText.value).length > 0;
      translateButton.disabled = !hasText || isTranslating;
      clearButton.disabled = !hasText || isTranslating;
    }

    function renderLanguageSelect(select, selectedCode) {
      select.innerHTML = languages.map((language) => {
        return '<option value="' + escapeHtml(language.code) + '">' + escapeHtml(language.label) + '</option>';
      }).join('');
      select.value = selectedCode;
    }

    function saveSettings() {
      localStorage.setItem(STORAGE_PREFIX + 'direction', direction);
      localStorage.setItem(STORAGE_PREFIX + 'sourceLang', sourceSelect.value);
      localStorage.setItem(STORAGE_PREFIX + 'targetLang', targetSelect.value);
    }

    function setDirection(nextDirection, keepLanguages) {
      const previousSource = sourceSelect.value || 'ja';
      const previousTarget = targetSelect.value || 'pt';

      direction = nextDirection || 'teacher-to-parent';
      document.querySelectorAll('[data-direction]').forEach((button) => {
        button.classList.toggle('is-active', button.dataset.direction === direction);
      });

      if (!keepLanguages) {
        if (direction === 'parent-to-teacher') {
          sourceSelect.value = previousTarget === 'ja' ? 'pt' : previousTarget;
          targetSelect.value = 'ja';
        } else {
          sourceSelect.value = 'ja';
          targetSelect.value = previousSource === 'ja' ? previousTarget : previousSource;
          if (targetSelect.value === 'ja') targetSelect.value = 'pt';
        }
      }

      updateRecognitionLanguage();
      saveSettings();
    }

    function updateRecognitionLanguage() {
      if (recognition) {
        recognition.lang = getSpeechCode(sourceSelect.value);
      }
    }

    function requestGasJsonp(action, values, timeoutMs) {
      return new Promise((resolve, reject) => {
        const callbackName = '__tsutaeruInterpreter_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
        const script = document.createElement('script');
        const query = new URLSearchParams();
        let timer = 0;

        function cleanup() {
          clearTimeout(timer);
          delete window[callbackName];
          script.remove();
        }

        query.set('action', action);
        query.set('callback', callbackName);
        Object.keys(values || {}).forEach((key) => {
          query.set(key, values[key]);
        });
        query.set('_', String(Date.now()));

        window[callbackName] = (result) => {
          cleanup();
          resolve(result || { ok: false, message: 'GASから結果が返りませんでした。' });
        };

        script.onerror = () => {
          cleanup();
          reject(new Error('GASへ接続できませんでした。通信を確認してください。'));
        };

        timer = setTimeout(() => {
          cleanup();
          reject(new Error('GASからの応答に時間がかかっています。通信を確認してください。'));
        }, Math.max(9000, Number(timeoutMs || 25000)));

        script.src = GAS_WEB_APP_URL + '?' + query.toString();
        document.head.appendChild(script);
      });
    }

    function setMicButtonState() {
      micButton.classList.toggle('is-listening', listening);
      micButton.setAttribute('aria-label', listening ? 'マイク停止' : 'マイク開始');
      micButton.innerHTML = listening
        ? '<i class="fa-solid fa-stop" aria-hidden="true"></i>'
        : '<i class="fa-solid fa-microphone" aria-hidden="true"></i>';
    }

    function ensureRecognition() {
      if (!SpeechRecognition) {
        setStatus('このブラウザは音声入力に対応していません。Chromeで開いてください。', true);
        return null;
      }

      if (recognition) return recognition;

      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = getSpeechCode(sourceSelect.value);

      recognition.onstart = () => {
        listening = true;
        baseTranscript = sourceText.value;
        setMicButtonState();
        setStatus('聞き取り中です。', false);
      };

      recognition.onresult = (event) => {
        let finalText = '';
        let interimText = '';

        for (let i = event.resultIndex; i < event.results.length; i += 1) {
          const transcript = event.results[i][0] ? event.results[i][0].transcript : '';
          if (event.results[i].isFinal) {
            finalText += transcript;
          } else {
            interimText += transcript;
          }
        }

        if (finalText) {
          baseTranscript = addSpeechPunctuation((baseTranscript ? baseTranscript + ' ' : '') + finalText);
        }

        sourceText.value = normalizeText((baseTranscript ? baseTranscript + ' ' : '') + interimText);
        updateTranslateButtonState();
      };

      recognition.onerror = (event) => {
        const error = event && event.error ? event.error : 'unknown';
        listening = false;
        setMicButtonState();
        setStatus('音声入力で問題が起きました：' + error, true);
      };

      recognition.onend = () => {
        listening = false;
        setMicButtonState();
        if (!statusEl.classList.contains('is-error')) {
          setStatus('停止中です。必要なら翻訳してください。', false);
        }
      };

      return recognition;
    }

    function toggleMic() {
      const nextRecognition = ensureRecognition();
      if (!nextRecognition) return;

      if (listening) {
        try {
          nextRecognition.stop();
        } catch (error) {
          listening = false;
          setMicButtonState();
        }
        return;
      }

      try {
        setStatus('マイクを準備しています。', false);
        updateRecognitionLanguage();
        baseTranscript = sourceText.value;
        nextRecognition.start();
      } catch (error) {
        setStatus('マイクを開始できませんでした。少し待ってもう一度押してください。', true);
      }
    }

    function buildSpeakableTextHtml(text, cardId) {
      const source = String(text || '');
      const parts = source.match(/\s+|[^\s]+/g) || [];
      let cursor = 0;

      return parts.map((part) => {
        const start = cursor;
        const end = cursor + part.length;
        cursor = end;

        if (/^\s+$/.test(part)) return escapeHtml(part);

        return '<span class="speech-token" data-speech-token="' + escapeHtml(cardId) + '" data-start="' + start + '" data-end="' + end + '">' + escapeHtml(part) + '</span>';
      }).join('');
    }

    function clearSpeechHighlight(cardId) {
      if (!cardId) return;

      document.querySelectorAll('[data-speech-token="' + cssEscapeValue(cardId) + '"]').forEach((token) => {
        token.classList.remove('is-speaking');
      });
    }

    function setSpeechHighlight(cardId, charIndex) {
      if (!speechState.started) return;

      clearSpeechHighlight(cardId);
      const tokens = Array.from(document.querySelectorAll('[data-speech-token="' + cssEscapeValue(cardId) + '"]'));
      const active = tokens.find((token) => {
        const start = Number(token.dataset.start || 0);
        const end = Number(token.dataset.end || 0);
        return charIndex >= start && charIndex < end;
      }) || tokens[tokens.length - 1];

      if (active) active.classList.add('is-speaking');
    }

    function updateSpeechControls(cardId, progress, isPlaying) {
      document.querySelectorAll('[data-speech-toggle]').forEach((button) => {
        const active = button.dataset.speechToggle === cardId && isPlaying;
        button.classList.toggle('is-playing', active);
        button.innerHTML = active
          ? '<i class="fa-solid fa-pause" aria-hidden="true"></i>'
          : '<i class="fa-solid fa-play" aria-hidden="true"></i>';
        button.setAttribute('aria-label', active ? '一時停止' : '再生');
      });

      if (cardId) {
        const slider = document.querySelector('[data-speech-slider="' + cssEscapeValue(cardId) + '"]');
        if (slider) slider.value = String(Math.max(0, Math.min(100, progress || 0)));
      }
    }

    function resetSpeechState(clearAll) {
      if (speechState.cardId) {
        clearSpeechHighlight(speechState.cardId);
        updateSpeechControls(speechState.cardId, 0, false);
      }

      speechState = {
        utterance: null,
        cardId: '',
        text: '',
        lang: '',
        offset: 0,
        started: false,
        paused: false
      };
    }

    function stopSpeech() {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      resetSpeechState(true);
    }

    function playSpeech(cardId, text, lang, startIndex) {
      if (!text || !window.speechSynthesis) return;

      if (speechState.cardId === cardId && speechState.utterance) {
        if (speechState.paused) {
          speechState.paused = false;
          window.speechSynthesis.resume();
          updateSpeechControls(cardId, Number((document.querySelector('[data-speech-slider="' + cssEscapeValue(cardId) + '"]') || {}).value || 0), true);
        } else {
          speechState.paused = true;
          window.speechSynthesis.pause();
          updateSpeechControls(cardId, Number((document.querySelector('[data-speech-slider="' + cssEscapeValue(cardId) + '"]') || {}).value || 0), false);
        }
        return;
      }

      stopSpeech();

      const offset = Math.max(0, Math.min(text.length - 1, Number(startIndex || 0)));
      const speakText = text.slice(offset).trim();

      if (!speakText) return;

      const utterance = new SpeechSynthesisUtterance(speakText);
      utterance.lang = lang;
      utterance.rate = 0.92;

      speechState = {
        utterance: utterance,
        cardId: cardId,
        text: text,
        lang: lang,
        offset: offset,
        started: false,
        paused: false
      };

      utterance.onstart = () => {
        speechState.started = true;
        updateSpeechControls(cardId, text.length ? (offset / text.length) * 100 : 0, true);
      };

      utterance.onboundary = (event) => {
        if (!speechState.started || speechState.cardId !== cardId) return;

        const charIndex = offset + Number(event.charIndex || 0);
        const progress = text.length ? (charIndex / text.length) * 100 : 0;
        setSpeechHighlight(cardId, charIndex);
        updateSpeechControls(cardId, progress, true);
      };

      utterance.onend = () => resetSpeechState(false);
      utterance.onerror = () => resetSpeechState(true);

      window.speechSynthesis.speak(utterance);
    }

    function seekSpeech(cardId, percent) {
      const textElement = document.querySelector('[data-speech-text="' + cssEscapeValue(cardId) + '"]');
      if (!textElement) return;

      const text = textElement.dataset.rawText || '';
      const lang = textElement.dataset.lang || 'ja-JP';
      const startIndex = Math.floor(text.length * (Number(percent || 0) / 100));

      stopSpeech();
      playSpeech(cardId, text, lang, startIndex);
    }

    function buildResultCard(title, text, lang, primary, cardId) {
      return (
        '<article class="result-card' + (primary ? ' is-primary' : '') + '">' +
          '<div class="result-head">' +
            '<strong>' + escapeHtml(title) + '</strong>' +
            '<div class="result-actions">' +
              '<button class="result-show-button" type="button" data-show-text="' + escapeHtml(text) + '" data-show-lang="' + escapeHtml(lang) + '" data-show-label="' + escapeHtml(title) + '">' +
                '<i class="fa-solid fa-display" aria-hidden="true"></i><span>見せる</span>' +
              '</button>' +
              '<button class="result-mini-button" type="button" data-speech-toggle="' + escapeHtml(cardId) + '" data-text="' + escapeHtml(text) + '" data-lang="' + escapeHtml(lang) + '" aria-label="再生">' +
                '<i class="fa-solid fa-play" aria-hidden="true"></i>' +
              '</button>' +
              '<input class="speech-slider" type="range" min="0" max="100" value="0" step="1" data-speech-slider="' + escapeHtml(cardId) + '" aria-label="再生位置">' +
              '<button class="result-mini-button" type="button" data-speech-stop="' + escapeHtml(cardId) + '" aria-label="停止">' +
                '<i class="fa-solid fa-stop" aria-hidden="true"></i>' +
              '</button>' +
            '</div>' +
          '</div>' +
          '<p class="result-text" data-speech-text="' + escapeHtml(cardId) + '" data-raw-text="' + escapeHtml(text) + '" data-lang="' + escapeHtml(lang) + '">' + buildSpeakableTextHtml(text, cardId) + '</p>' +
        '</article>'
      );
    }

    function bindResultButtons() {
      document.querySelectorAll('[data-speech-toggle]').forEach((button) => {
        button.addEventListener('click', () => {
          playSpeech(button.dataset.speechToggle, button.dataset.text || '', button.dataset.lang || 'ja-JP');
        });
      });

      document.querySelectorAll('[data-speech-stop]').forEach((button) => {
        button.addEventListener('click', () => {
          if (speechState.cardId === button.dataset.speechStop) {
            stopSpeech();
          }
        });
      });

      document.querySelectorAll('[data-speech-slider]').forEach((slider) => {
        slider.addEventListener('input', () => {
          if (speechState.cardId === slider.dataset.speechSlider) {
            setSpeechHighlight(slider.dataset.speechSlider, Math.floor((speechState.text.length || 1) * (Number(slider.value || 0) / 100)));
          }
        });

        slider.addEventListener('change', () => {
          seekSpeech(slider.dataset.speechSlider, slider.value);
        });
      });

      document.querySelectorAll('[data-show-text]').forEach((button) => {
        button.addEventListener('click', () => {
          openShowModal(button.dataset.showText || '', button.dataset.showLang || 'ja-JP', button.dataset.showLabel || '相手に見せる');
        });
      });

      document.querySelectorAll('[data-retry-translation]').forEach((button) => {
        button.addEventListener('click', () => retryTranslation(Number(button.dataset.retryTranslation || 0)));
      });
    }

    function buildResultSetHtml(item) {
      const response = item.response;
      const itemDirection = item.direction || direction;
      const originalText = item.originalText || response.sourceText || '';
      const sourceLang = response.sourceLang || sourceSelect.value;
      const targetLang = response.targetLang || targetSelect.value;
      const jaText = sourceLang === 'ja'
        ? originalText
        : (targetLang === 'ja' ? response.targetText || '' : response.japaneseText || '');
      const motherLang = sourceLang !== 'ja' && sourceLang !== 'en'
        ? sourceLang
        : (targetLang !== 'ja' && targetLang !== 'en' ? targetLang : targetLang);
      const motherText = motherLang === sourceLang
        ? originalText
        : (motherLang === targetLang ? response.targetText || '' : '');
      const cards = [
        {
          key: 'mother',
          title: getLanguage(motherLang).label,
          text: motherText,
          lang: getSpeechCode(motherLang),
          primary: direction === 'teacher-to-parent'
        },
        {
          key: 'ja',
          title: 'JP 日本語',
          text: jaText,
          lang: 'ja-JP',
          primary: direction === 'parent-to-teacher'
        },
        {
          key: 'en',
          title: 'US 英語',
          text: response.englishText || '',
          lang: 'en-US',
          primary: false
        }
      ];
      const orderedCards = itemDirection === 'parent-to-teacher'
        ? [cards[1], cards[2], cards[0]]
        : [cards[0], cards[2], cards[1]];

      return (
        '<section class="result-set" data-result-id="result-' + escapeHtml(item.number) + '">' +
          '<span class="result-number">#' + escapeHtml(item.number) + '</span>' +
          '<p class="result-set-title">' + escapeHtml(item.createdAt) + '</p>' +
          orderedCards.map((card) => buildResultCard(card.title, card.text, card.lang, card.primary, 'result-' + item.number + '-' + card.key)).join('') +
        '</section>'
      );
    }

    function addPendingTranslation(text, sourceLang, targetLang) {
      const item = {
        number: translationHistory.length + 1,
        createdAt: new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }),
        originalText: text,
        direction: direction,
        pending: true,
        error: false,
        response: {
          sourceLang: sourceLang,
          targetLang: targetLang,
          sourceText: text,
          englishText: '',
          targetText: ''
        }
      };

      translationHistory.push(item);
      renderTranslationHistory();
      openTranslationModal();
      return item;
    }

    function renderTranslationHistory() {
      const previousTops = new Map();
      modalResults.querySelectorAll('[data-result-id]').forEach((element) => {
        previousTops.set(element.dataset.resultId, element.getBoundingClientRect().top);
      });

      const items = translationOrder === 'oldest'
        ? translationHistory.slice()
        : translationHistory.slice().reverse();

      modalResults.innerHTML = items.length
        ? items.map((item) => item.pending
            ? '<section class="result-set is-pending" data-result-id="result-' + escapeHtml(item.number) + '"><span class="result-number">#' + escapeHtml(item.number) + '</span><p class="result-set-title">' + escapeHtml(item.createdAt) + '</p><div class="modal-loading"><i class="fa-solid fa-spinner fa-spin" aria-hidden="true"></i><span>翻訳中です。</span></div><p class="result-text">' + escapeHtml(item.originalText || '') + '</p></section>'
            : item.error
              ? '<section class="result-set is-error" data-result-id="result-' + escapeHtml(item.number) + '"><span class="result-number">#' + escapeHtml(item.number) + '</span><p class="result-set-title">' + escapeHtml(item.createdAt) + '</p><div class="modal-loading"><i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i><span>翻訳に失敗しました。文を短くすると通りやすいです。</span></div><p class="result-text">' + escapeHtml(item.originalText || '') + '</p><button class="result-retry-button" type="button" data-retry-translation="' + escapeHtml(item.number) + '"><i class="fa-solid fa-rotate-right" aria-hidden="true"></i><span>もう一度翻訳する</span></button></section>'
            : buildResultSetHtml(item)
          ).join('')
        : '<p class="result-empty">翻訳結果がここに表示されます。</p>';

      orderNewest.classList.toggle('is-active', translationOrder === 'newest');
      orderOldest.classList.toggle('is-active', translationOrder === 'oldest');
      bindResultButtons();

      requestAnimationFrame(() => {
        modalResults.querySelectorAll('[data-result-id]').forEach((element) => {
          const previousTop = previousTops.get(element.dataset.resultId);
          if (typeof previousTop !== 'number') return;

          const delta = previousTop - element.getBoundingClientRect().top;
          if (Math.abs(delta) < 1) return;

          element.animate([
            { transform: 'translateY(' + delta + 'px)' },
            { transform: 'translateY(0)' }
          ], {
            duration: 260,
            easing: 'cubic-bezier(0.2, 0.8, 0.2, 1)'
          });
        });
      });
    }

    function openTranslationModal() {
      translationModal.hidden = false;
      document.body.style.overflow = 'hidden';
    }

    function closeTranslationModal() {
      translationModal.hidden = true;
      if (showModal.hidden) {
        document.body.style.overflow = '';
      }
    }

    function renderTranslation(response, originalText, activePendingItem) {
      const pendingItem = activePendingItem || translationHistory.find((item) => item.pending && item.originalText === originalText);
      const targetLang = response.targetLang || targetSelect.value;

      if (pendingItem) {
        pendingItem.pending = false;
        pendingItem.error = false;
        pendingItem.response = response;
        pendingItem.originalText = originalText;
        pendingItem.direction = pendingItem.direction || direction;
      } else {
        translationHistory.push({
          number: translationHistory.length + 1,
          createdAt: new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }),
          response: response,
          originalText: originalText,
          direction: direction,
          pending: false,
          error: false
        });
      }

      renderTranslationHistory();
      openTranslationModal();
      const itemNumber = pendingItem ? pendingItem.number : translationHistory.length;
      const itemDirection = pendingItem ? pendingItem.direction : direction;
      const playCardKey = itemDirection === 'parent-to-teacher'
        ? 'ja'
        : 'mother';
      playSpeech('result-' + itemNumber + '-' + playCardKey, response.targetText || '', getSpeechCode(targetLang));
    }

    function openShowModal(text, lang, label) {
      showSpeechPayload = { text: text || '', lang: lang || 'ja-JP' };
      showModalLabel.textContent = label || '相手に見せる';
      showModalText.textContent = text || '';
      showModal.hidden = false;
      document.body.style.overflow = 'hidden';
    }

    function closeShowModal() {
      stopSpeech();
      showModal.hidden = true;
      if (translationModal.hidden) {
        document.body.style.overflow = '';
      }
    }

    function persistTranslationInBackground(response) {
      if (!response || !response.ok) return;

      const hasCacheEntries = Array.isArray(response.cacheEntries) && response.cacheEntries.length;
      const hasBankPayload = response.sourceText && response.englishText && response.targetText;

      if (!hasCacheEntries && !hasBankPayload && !Number(response.usageCount || 0)) return;

      requestGasJsonp('persistExternalInterpreterTranslation', {
        entriesJson: JSON.stringify(hasCacheEntries ? response.cacheEntries : []),
        usageCount: String(Number(response.usageCount || 0)),
        bankJson: JSON.stringify(hasBankPayload ? {
          sourceLang: response.sourceLang,
          targetLang: response.targetLang,
          sourceText: response.sourceText,
          englishText: response.englishText,
          targetText: response.targetText
        } : null)
      }, 25000).catch(() => {});
    }

    function requestAndRenderTranslation(pendingItem) {
      const text = pendingItem.originalText;
      const sourceLang = pendingItem.response.sourceLang;
      const targetLang = pendingItem.response.targetLang;
      Promise.all([
        requestGasJsonp('translateExternalInterpreter', {
          text: text,
          sourceLang: sourceLang,
          targetLang: targetLang
        }, 30000),
        sleep(1000)
      ]).then(([response]) => {
        if (!response || !response.ok) {
          throw new Error(response && response.message ? response.message : '翻訳に失敗しました。');
        }

        renderTranslation(response, text, pendingItem);
        persistTranslationInBackground(response);
        setStatus(response.fromTranslationBank ? '翻訳バンクから表示しました。' : '翻訳しました。', false);
      }).catch((error) => {
        if (pendingItem) {
          pendingItem.pending = false;
          pendingItem.error = true;
          pendingItem.errorMessage = error && error.message ? error.message : '翻訳に失敗しました。';
          pendingItem.response.targetText = '';
          pendingItem.response.englishText = '';
          renderTranslationHistory();
        }
        if (!translationHistory.length) {
          modalResults.innerHTML = '<p class="result-empty">翻訳結果がここに表示されます。</p>';
        }
        setStatus(error && error.message ? error.message : '翻訳に失敗しました。', true);
      }).finally(() => {
        isTranslating = false;
        updateTranslateButtonState();
        translateButton.innerHTML = '<i class="fa-solid fa-language" aria-hidden="true"></i><span>翻訳する</span>';
      });
    }

    function translateText() {
      const text = prepareTextForTranslation(sourceText.value);
      const sourceLang = sourceSelect.value;
      const targetLang = targetSelect.value;

      if (!text) {
        setStatus('文章を入力してから翻訳してください。', true);
        return;
      }

      if (sourceLang === targetLang) {
        setStatus('入力する言語と翻訳する言語を別々にしてください。', true);
        return;
      }

      sourceText.value = text;
      isTranslating = true;
      translateButton.disabled = true;
      translateButton.innerHTML = '<i class="fa-solid fa-spinner fa-spin" aria-hidden="true"></i><span>翻訳中</span>';
      setStatus('翻訳しています。', false);
      const pendingItem = addPendingTranslation(text, sourceLang, targetLang);

      requestAndRenderTranslation(pendingItem);
    }

    function retryTranslation(number) {
      const item = translationHistory.find((historyItem) => historyItem.number === number);
      if (!item || isTranslating) return;

      item.pending = true;
      item.error = false;
      isTranslating = true;
      translateButton.disabled = true;
      translateButton.innerHTML = '<i class="fa-solid fa-spinner fa-spin" aria-hidden="true"></i><span>翻訳中</span>';
      setStatus('もう一度翻訳しています。', false);
      renderTranslationHistory();
      openTranslationModal();
      requestAndRenderTranslation(item);
    }

    function initialize() {
      const savedSource = params.get('sourceLang') || localStorage.getItem(STORAGE_PREFIX + 'sourceLang') || 'ja';
      const savedTarget = params.get('targetLang') || localStorage.getItem(STORAGE_PREFIX + 'targetLang') || 'pt';

      renderLanguageSelect(sourceSelect, savedSource);
      renderLanguageSelect(targetSelect, savedTarget);
      sourceText.value = params.get('text') || '';
      setDirection(direction, true);

      document.querySelectorAll('[data-direction]').forEach((button) => {
        button.addEventListener('click', () => setDirection(button.dataset.direction, false));
      });

      sourceSelect.addEventListener('change', () => {
        updateRecognitionLanguage();
        saveSettings();
      });

      targetSelect.addEventListener('change', saveSettings);
      sourceText.addEventListener('input', updateTranslateButtonState);
      micButton.addEventListener('click', toggleMic);
      translateButton.addEventListener('click', translateText);
      clearButton.addEventListener('click', () => {
        sourceText.value = '';
        baseTranscript = '';
        updateTranslateButtonState();
        setStatus('消しました。', false);
      });

      modalClose.addEventListener('click', closeTranslationModal);
      showModalClose.addEventListener('click', closeShowModal);
      showModalSpeak.addEventListener('click', () => {
        playSpeech('show-modal-text', showSpeechPayload.text, showSpeechPayload.lang);
      });
      orderNewest.addEventListener('click', () => {
        translationOrder = 'newest';
        renderTranslationHistory();
      });
      orderOldest.addEventListener('click', () => {
        translationOrder = 'oldest';
        renderTranslationHistory();
      });

      if (!SpeechRecognition) {
        setStatus('このブラウザは音声入力に対応していません。Chromeで開いてください。', true);
      }

      updateTranslateButtonState();
    }

    initialize();
  </script>
</body>
</html>
