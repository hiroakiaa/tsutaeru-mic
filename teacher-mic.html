<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>つたえる君 外部マイク</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --bg: #010605;
      --panel: #010605;
      --panel-soft: #010605;
      --text: #f7fffc;
      --muted: #a9c8bf;
      --main: #28d7c3;
      --main-dark: #12a99a;
      --line: rgba(40, 215, 195, 0.42);
      --line-strong: #28d7c3;
      --accent: #8fb3ff;
      --danger: #ff7890;
      --shadow: none;
      --page-padding: 16px;
      --mobile-browser-space: 0px;
    }

    * {
      box-sizing: border-box;
      touch-action: manipulation;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      height: 100vh;
      height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: var(--page-padding);
      padding-bottom: calc(var(--page-padding) + var(--mobile-browser-space) + env(safe-area-inset-bottom));
      overflow: hidden;
    }

    body.is-room-preparing main {
      visibility: hidden;
    }

    .room-startup {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
    }

    .room-startup[hidden] {
      display: none;
    }

    .room-startup-content {
      display: grid;
      justify-items: center;
      gap: 16px;
      width: min(100%, 420px);
      text-align: center;
    }

    .room-startup-icon {
      display: grid;
      place-items: center;
      width: 72px;
      height: 72px;
      color: #002a25;
      background: var(--main);
      border-radius: 50%;
      font-size: 2rem;
      box-shadow: 0 18px 46px rgba(40, 215, 195, 0.2);
    }

    .room-startup-title {
      margin: 0;
      color: var(--text);
      font-size: clamp(1.25rem, 5vw, 1.7rem);
      font-weight: 900;
    }

    .room-startup-message {
      min-height: 1.6em;
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.7;
    }

    .room-startup-retry {
      min-width: 150px;
      color: #002a25;
      background: var(--main);
    }

    .room-startup-retry[hidden] {
      display: none;
    }

    main {
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      gap: 0;
      width: min(1200px, 100%);
      height: 100%;
      margin: 0 auto;
      background: transparent;
    }

    p {
      color: var(--muted);
      line-height: 1.8;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex: 1 1 auto;
      max-width: none;
      min-height: 36px;
      border-radius: 0;
      background: var(--bg);
      color: var(--main);
      border: 0;
      border-bottom: 1px solid var(--line);
      padding: 8px 0;
      font-weight: 800;
      margin: 0;
      box-shadow: none;
      line-height: 1.5;
    }

    .status.is-error {
      background: var(--bg);
      color: var(--danger);
      border-bottom-color: rgba(255, 120, 144, 0.62);
    }

    .controls {
      display: none;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
    }

    .main-button {
      background: var(--main);
      color: #002a25;
      box-shadow: 0 18px 42px rgba(40, 215, 195, 0.26);
    }

    .sub-button {
      background: rgba(9, 35, 29, 0.92);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .sub-button.is-active {
      background: var(--main);
      color: #002a25;
      border-color: var(--main);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0;
    }

    .meta div {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      border: 0;
      border-radius: 0;
      padding: 0 4px 0 0;
      background: transparent;
    }

    .meta label,
    .meta .room-meta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-weight: 700;
    }

    .meta small {
      display: inline;
      color: var(--muted);
      font-weight: 700;
      margin-right: 0;
    }

    .meta strong {
      color: var(--text);
    }

    .meta select {
      min-height: 34px;
      border: 0;
      border-bottom: 1px solid rgba(40, 215, 195, 0.52);
      border-radius: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 16px;
      font-weight: 800;
      outline: none;
      padding: 4px 2px;
    }

    .room-meta {
      position: relative;
      flex: 0 1 auto;
    }

    .subject-meta {
      flex: 0 1 auto;
    }

    .room-id-display {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-width: 5.8rem;
      min-height: 34px;
      padding: 4px 8px;
      color: var(--main);
      background: transparent;
      border-bottom: 1px solid rgba(40, 215, 195, 0.52);
      font-size: 1.05rem;
      font-weight: 900;
    }

    .meta select {
      width: 8.4rem;
      appearance: auto;
    }

    .meta input:disabled,
    .meta select:disabled {
      opacity: 0.72;
    }

    .history {
      display: flex;
      flex-direction: column;
      border: 0;
      border-radius: 0;
      background: var(--bg);
      box-shadow: var(--shadow);
      padding: 8px 0 0;
      min-height: 0;
      overflow: hidden;
    }

    .history-head {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 14px;
      flex: 0 0 auto;
    }

    .history-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .history-actions[hidden] {
      display: none !important;
    }

    .history-actions button {
      padding: 10px 14px;
      font-size: 0.9rem;
    }

    .history-list {
      display: grid;
      gap: 10px;
      align-content: start;
      flex: 1 1 auto;
      max-height: none;
      overflow: auto;
      padding-right: 4px;
      padding-bottom: 4px;
    }

    .history-empty {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .history-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #010605;
      padding: 12px 14px;
    }

    .history-card.is-sending {
      border-color: rgba(255, 216, 117, 0.72);
      background: rgba(31, 24, 8, 0.78);
    }

    .history-card.is-checking {
      border-color: rgba(143, 179, 255, 0.7);
      background: rgba(9, 16, 42, 0.82);
    }

    .history-card.is-error {
      border-color: rgba(255, 120, 144, 0.72);
      background: rgba(42, 8, 15, 0.82);
    }

    .history-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }

    .history-card small {
      color: var(--main);
      font-weight: 800;
    }

    .history-card-state {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(40, 215, 195, 0.34);
      border-radius: 999px;
      padding: 4px 8px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .history-card.is-sending .history-card-state {
      border-color: rgba(255, 216, 117, 0.56);
      color: #ffe3a1;
    }

    .history-card.is-checking .history-card-state {
      border-color: rgba(143, 179, 255, 0.58);
      color: #b9ccff;
    }

    .history-card.is-error .history-card-state {
      border-color: rgba(255, 120, 144, 0.58);
      color: #ff9dae;
    }

    .history-card-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      margin-top: 10px;
      padding: 5px 12px;
      color: #ffccd5;
      background: rgba(255, 120, 144, 0.12);
      border: 1px solid rgba(255, 120, 144, 0.45);
      border-radius: 999px;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 850;
      cursor: pointer;
    }

    .history-spinner {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255, 227, 161, 0.32);
      border-top-color: #ffe3a1;
      border-radius: 50%;
      animation: kotoba-spin 0.8s linear infinite;
    }

    @keyframes kotoba-spin {
      to {
        transform: rotate(360deg);
      }
    }

    .history-card p {
      margin: 0;
      color: var(--text);
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .input-area {
      display: flex;
      align-items: center;
      gap: 12px;
      border: 0;
      border-radius: 0;
      background: var(--bg);
      box-shadow: none;
      padding: 0;
    }

    .mic-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      padding: 0;
      font-size: 1.34rem;
    }

    .mic-toggle i {
      font-size: 1.45em;
      line-height: 1;
    }

    .mic-toggle.is-running {
      background: var(--danger);
      color: #fff;
      box-shadow: 0 18px 42px rgba(255, 120, 144, 0.24);
    }

    @media (max-width: 640px) {
      :root {
        --page-padding: 10px;
        --mobile-browser-space: 0px;
      }

      body {
        overflow: hidden;
      }

      main {
        gap: 0;
      }

      button {
        width: 100%;
      }

      .history-head {
        gap: 10px;
      }

      .meta {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto;
        align-items: center;
        gap: 8px;
        font-size: 0.92rem;
      }

      .meta div {
        padding: 0;
      }

      .meta label,
      .meta .room-meta {
        min-width: 0;
      }

      .meta select {
        width: 100%;
        font-size: 16px;
      }

      .room-id-display {
        width: 100%;
        min-width: 0;
      }

      .history-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        justify-content: center;
        justify-items: stretch;
        width: min(100%, 520px);
        margin: 0 auto;
      }

      .history-actions button {
        width: 100%;
        text-align: center;
      }

      .history {
        padding: 4px 0 0;
      }

      .input-area {
        padding: 0;
        gap: 8px;
      }

      .status {
        min-height: 40px;
        font-size: 0.86rem;
        padding: 7px 10px;
      }

      .mic-toggle {
        width: 48px;
        height: 48px;
        font-size: 1.12rem;
      }

      .input-area .mic-toggle {
        width: 48px;
      }
    }

    @media (max-width: 420px) {
      :root {
        --mobile-browser-space: 0px;
      }

      .history-actions button {
        padding: 9px 10px;
        font-size: 0.84rem;
      }

      .history-empty {
        font-size: 0.92rem;
      }

      .meta {
        grid-template-columns: minmax(0, 1.08fr) minmax(0, 0.92fr);
      }

      .sent-meta {
        grid-column: 1 / -1;
        justify-self: end;
      }
    }
  </style>
</head>
<body class="is-room-preparing">
  <section class="room-startup" id="room-startup" role="status" aria-live="polite">
    <div class="room-startup-content">
      <div class="room-startup-icon" id="room-startup-icon" aria-hidden="true">
        <i class="fa-solid fa-spinner fa-spin"></i>
      </div>
      <h1 class="room-startup-title" id="room-startup-title">ルーム作成中</h1>
      <p class="room-startup-message" id="room-startup-message">空いているルームIDを確認しています。</p>
      <button class="room-startup-retry" type="button" id="room-startup-retry" hidden>
        <i class="fa-solid fa-rotate-right" aria-hidden="true"></i>
        <span>もう一度試す</span>
      </button>
    </div>
  </section>

  <main>
    <section class="history" aria-label="送信した文">
      <div class="history-head">
        <div class="meta">
          <div class="room-meta">
            <span>ルーム</span>
            <span class="room-id-display" id="room-id-display">
              <i class="fa-solid fa-spinner fa-spin" aria-hidden="true"></i>
              <span>作成中</span>
            </span>
          </div>
          <label class="subject-meta">
            <span>教科</span>
            <select id="subject-input">
              <option value="math">数学</option>
              <option value="common">共通</option>
              <option value="science">理科</option>
              <option value="social">社会</option>
              <option value="english">英語</option>
              <option value="school_life">学校生活</option>
            </select>
          </label>
          <div class="sent-meta">
            <small>送信</small>
            <strong id="sent-count-label">0件</strong>
          </div>
        </div>
        <section class="input-area" aria-label="音声入力">
          <div class="status" id="status">停止中</div>
          <button class="main-button mic-toggle" type="button" id="start-button" aria-label="マイク開始" disabled>
            <i class="fa-solid fa-microphone" aria-hidden="true"></i>
          </button>
        </section>
        <div class="history-actions" id="history-actions" hidden>
          <button class="sub-button" type="button" id="history-oldest-button">最初から並べる</button>
          <button class="sub-button is-active" type="button" id="history-newest-button">最新文から並べる</button>
        </div>
      </div>
      <div class="history-list" id="history-list">
        <p class="history-empty">右のマイクボタンを押してから話すと、下に文が入ります。その後、アプリ側に送信されて、生徒側に表示されます。</p>
      </div>
    </section>
  </main>

      [/先生に持ってきて丸/g, '先生のところに持ってきて、丸'],

    const params = new URLSearchParams(location.search);

    function requestGasJsonp(action, values, timeoutMs) {
      return new Promise((resolve, reject) => {
        const callbackName = '__tsutaeruGas_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
        const script = document.createElement('script');
        const query = new URLSearchParams();
        let timer = 0;

        function cleanup() {
          clearTimeout(timer);
          delete window[callbackName];
          script.remove();
        }

        query.set('action', action);
        query.set('callback', callbackName);
        Object.keys(values || {}).forEach((key) => {
          query.set(key, values[key]);
        });
        query.set('_', String(Date.now()));

        window[callbackName] = (result) => {
          cleanup();
          resolve(result || { ok: false, message: 'GASから結果が返りませんでした。' });
        };

        script.onerror = () => {
          cleanup();
          reject(new Error('GASへ接続できませんでした。通信を確認してください。'));
        };

        timer = setTimeout(() => {
          cleanup();
          reject(new Error('GASからの応答に時間がかかっています。通信を確認してください。'));
        }, Math.max(8000, Number(timeoutMs || 20000)));

        script.src = GAS_WEB_APP_URL + '?' + query.toString();
        document.head.appendChild(script);
      });
    }

    function requestUnusedLessonRoomId() {
      return requestGasJsonp('generateUnusedLessonRoomId', {}, 15000).then((result) => {
        if (!result || !result.ok || !result.roomId) {
          throw new Error(result && result.message ? result.message : 'ルーム番号を発行できませんでした。');
        }

        return String(result.roomId);
      });
    }

    function initializeExternalRoomId() {
      if (roomId) {
        renderExternalRoomId();
        startButton.disabled = false;
        setStatus('ルーム ' + roomId + ' の準備ができました。', false);
        completeRoomStartup();
        return Promise.resolve(true);
      }

      setRoomStartupLoading();
      startButton.disabled = true;
      renderExternalRoomId();
      setStatus('空いているルームIDを作成しています。', false);
      setHistoryEmptyMessage('ルームIDを作成しています。番号が表示されるまでお待ちください。');

      return requestUnusedLessonRoomId().then((nextRoomId) => {
        roomId = nextRoomId;
        renderExternalRoomId();
        saveExternalMicSettings();
        startButton.disabled = false;
        setStatus('ルーム ' + roomId + ' の準備ができました。', false);
        setHistoryEmptyMessage('右のマイクボタンを押してから話すと、下に文が入ります。その後、アプリ側に送信されて、生徒側に表示されます。');
        completeRoomStartup();
        return true;
      }).catch((error) => {
        renderExternalRoomId();
        startButton.disabled = true;
        const message = error && error.message ? error.message : 'ルーム番号を発行できませんでした。';
        setStatus(message, true);
        setHistoryEmptyMessage('ルームIDを作成してからマイクを開始できます。');
        showRoomStartupError(message);
        return false;
      });
    }

    function ensureMicrophonePermission() {
      if (
        !navigator.mediaDevices ||
        typeof navigator.mediaDevices.getUserMedia !== 'function'
      ) {
        return Promise.resolve(true);
      }

      if (microphonePermissionPromise) {
        return microphonePermissionPromise;
      }

      setStatus('マイクの使用許可を確認しています。', false);

      microphonePermissionPromise = navigator.mediaDevices.getUserMedia({
        audio: true
      }).then((stream) => {
        stream.getTracks().forEach((track) => track.stop());
        return true;
      }).catch((error) => {
        microphonePermissionPromise = null;
        const errorName = error && error.name ? error.name : '';
        if (errorName === 'NotAllowedError' || errorName === 'PermissionDeniedError') {
          setStatus('マイクが許可されていません。ブラウザのマイク許可を確認してください。', true);
        } else {
          setStatus('マイクを準備できませんでした。接続と端末設定を確認してください。', true);
        }
        return false;
      });

      return microphonePermissionPromise;
    }

    function postToGas(action, values, timeoutMs) {
      return requestGasJsonp(action, values, timeoutMs);
    }

    function openExternalLessonRoom() {
      saveExternalMicSettings();

      if (!roomId) {
        setStatus('ルームIDを入力してください。', true);
        return Promise.resolve(false);
      }

      if (hasOpenedRoom) {
        return Promise.resolve(true);
      }

      if (openRoomPromise) {
        return openRoomPromise;
      }

      roomOpenFailed = false;
      setSettingsDisabled(true);
      setStatus('ルーム ' + roomId + ' に入室しています。', false);

      openRoomPromise = postToGas('openLessonRoom', {
        roomId: roomId,
        sessionId: sessionId,
        teacherName: '外部マイク',
        joinExisting: 'true'
      }, 20000).then((result) => {
        if (!result || !result.ok || !result.roomKey) {
          throw new Error(result && result.message ? result.message : 'ルームに入室できませんでした。');
        }

        roomKey = String(result.roomKey || roomKey || '').trim();
        if (result.sessionId) {
          sessionId = String(result.sessionId || sessionId).trim();
        }
        hasOpenedRoom = true;
        saveExternalMicSettings();
        startLessonHeartbeat();
        setStatus(running ? 'マイク入力中です。ルームの準備も完了しました。' : '入室準備が完了しました。', false);
        return true;
      }).catch(() => {
        roomOpenFailed = true;
        setStatus(getConnectionHelpMessage(), true);
        setSettingsDisabled(false);
        setHistoryEmptyMessage('右のマイクボタンを押してから話すと、下に文が入ります。その後、アプリ側に送信されて、生徒側に表示されます。');
        return false;
      }).finally(() => {
        openRoomPromise = null;
      });

      return openRoomPromise;
    }

    function startLessonHeartbeat() {
      clearInterval(heartbeatTimer);
      heartbeatTimer = setInterval(() => {
        if (!hasOpenedRoom || !roomId || !sessionId) return;

        postToGas('lessonTeacherHeartbeat', {
          roomId: roomId,
          roomKey: roomKey,
          sessionId: sessionId
        }, 12000).then((result) => {
          if (result && result.ok && result.roomKey) {
            roomKey = String(result.roomKey || roomKey).trim();
          }
        }).catch(() => {
          // 入室状態の補助なので失敗しても音声入力を止めません。
        });
      }, 30000);
    }

    function closeExternalLessonRoom() {
      if (!hasOpenedRoom || !roomId || !sessionId) return;

      clearInterval(heartbeatTimer);
      postToGas('closeLessonRoom', {
        roomId: roomId,
        roomKey: roomKey,
        sessionId: sessionId
      }, 12000).catch(() => {
        // 退室補助なので失敗してもページ終了を妨げません。
      });
      hasOpenedRoom = false;
    }

    function formatHistoryTime(date) {
      return [
        String(date.getHours()).padStart(2, '0'),
        String(date.getMinutes()).padStart(2, '0'),
        String(date.getSeconds()).padStart(2, '0')
      ].join(':');
    }

    function renderSentHistory() {
      const rows = historyOrder === 'newest'
        ? sentHistory.slice().reverse()
        : sentHistory.slice();

      historyOldestButton.classList.toggle('is-active', historyOrder === 'oldest');
      historyNewestButton.classList.toggle('is-active', historyOrder === 'newest');

      if (!rows.length) {
        historyListEl.innerHTML = '<p class="history-empty">' + escapeHtml(historyEmptyMessage) + '</p>';
        return;
      }

      historyListEl.innerHTML = rows.map((item) => {
        const isSending = item.state === 'sending';
        const isRetrying = item.state === 'retrying';
        const isChecking = item.state === 'checking';
        const isError = item.state === 'error';
        const stateHtml = isSending || isRetrying || isChecking
          ? '<span class="history-card-state"><span class="history-spinner" aria-hidden="true"></span>' + (isChecking ? '保存確認中' : (isRetrying ? '再送中' : '送信準備中')) + '</span>'
          : (isError
            ? '<span class="history-card-state">未送信</span>'
            : '<span class="history-card-state">送信済み</span>');
        const retryHtml = isError
          ? '<button class="history-card-action" type="button" data-retry-history="' + escapeHtml(item.id) + '">この文を再送する</button>'
          : '';

        return [
          '<article class="history-card' + ((isSending || isRetrying) ? ' is-sending' : '') + (isChecking ? ' is-checking' : '') + (isError ? ' is-error' : '') + '">',
          '<div class="history-card-head">',
          '<small>#' + item.index + ' ' + item.time + '</small>',
          stateHtml,
          '</div>',
          '<p>' + escapeHtml(item.text) + '</p>',
          retryHtml,
          '</article>'
        ].join('');
      }).join('');
    }

    function addSentHistory(text, state) {
      const safeText = normalizeText(text);
      if (!safeText) return '';

      const id = Date.now() + '-' + Math.floor(Math.random() * 1000000);
      const item = {
        id: id,
        index: sentHistory.length + 1,
        time: formatHistoryTime(new Date()),
        text: safeText,
        state: state || 'sent',
        attempts: 0
      };

      sentHistory.push(item);
      renderSentHistory();
      return id;
    }

    function markSentHistoryDone(id) {
      if (!id) return;
      const item = sentHistory.find((row) => row.id === id);
      if (!item) return;
      item.state = 'sent';
      item.error = '';
      renderSentHistory();
    }

    function updateSentHistoryState(id, state, error) {
      if (!id) return;
      const item = sentHistory.find((row) => row.id === id);
      if (!item) return;
      item.state = state || item.state;
      item.error = error || '';
      renderSentHistory();
    }

    function incrementSentHistoryAttempt(id) {
      if (!id) return 0;
      const item = sentHistory.find((row) => row.id === id);
      if (!item) return 0;
      item.attempts = Number(item.attempts || 0) + 1;
      return item.attempts;
    }

    function retrySentHistory(id) {
      const item = sentHistory.find((row) => row.id === id);
      if (!item || !item.text) return;
      item.state = 'retrying';
      renderSentHistory();
      sendLessonText(item.text, true, item.id);
    }

    function confirmLessonTextSaved(historyId) {
      if (!historyId || !roomId || !sessionId) {
        return Promise.resolve(false);
      }

      updateSentHistoryState(historyId, 'checking');

      return postToGas('checkLessonClientEventStatus', {
        roomId: roomId,
        roomKey: roomKey,
        sessionId: sessionId,
        clientEventId: historyId
      }, 12000).then((result) => {
        return Boolean(result && result.ok && result.saved);
      }).catch(() => false);
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function normalizeText(value) {
      return String(value || '')
        .replace(/[\u00a0\u3000]/g, ' ')
        .replace(/\s+/g, ' ')
        .replace(/([ぁ-んァ-ヶ一-龠々ー])\s+(?=[ぁ-んァ-ヶ一-龠々ー])/g, '$1')
        .replace(/([ぁ-んァ-ヶ一-龠々ー])\s+(?=[、。！？!?])/g, '$1')
        .replace(/([、。！？!?])\s+(?=[ぁ-んァ-ヶ一-龠々ー])/g, '$1')
        .trim();
    }

    function applyMicCorrectionRules(text) {
      return KOTOBA_MIC_CORRECTIONS.reduce((current, rule) => {
        return current.replace(rule[0], rule[1]);
      }, String(text || ''));
    }

    function normalizeLessonMathText(text) {
      const safeText = normalizeText(text);
      if (!safeText) return '';

      return applyMicCorrectionRules(safeText)
        .replace(/ルート\s*([0-9０-９]+)/g, '√$1')
        .replace(/√\s*([0-9０-９]+)/g, '√$1')
        .replace(/[（(]\s*[xX]\s*[+＋]\s*([A-Za-zＡ-Ｚａ-ｚ])\s*[）)]?\s*[（(]\s*[xX]\s*[+＋]\s*([A-Za-zＡ-Ｚａ-ｚ])\s*[）)]/g, '(x+$1)(x+$2)')
        .replace(/[（(]\s*[xX]\s*[+＋]\s*([A-Za-zＡ-Ｚａ-ｚ])\s+[（(]\s*[xX]\s*[+＋]\s*([A-Za-zＡ-Ｚａ-ｚ])(?=の|を|で|、|。|$)/g, '(x+$1)(x+$2)')
        .replace(/[（(]\s*[xX]\s*[+＋]\s*([A-Za-zＡ-Ｚａ-ｚ])\s*(?:の)?2乗/g, '(x+$1)の2乗')
        .replace(/[xX]\s*[+＋]\s*([A-Za-zＡ-Ｚａ-ｚ])/g, 'x+$1')
        .replace(/\s*([＋+＝=×÷])\s*/g, '$1')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function prepareJapaneseForLessonText(text) {
      const safeText = normalizeText(text);
      if (!safeText) return '';

      return safeText
        .replace(/(こんにちは|おはようございます|こんばんは)(?=(これから|さて|では|それでは|まず|次に|続いて|最後に|教科書|ノート|黒板|復習問題|問い|問|問題))/g, '$1。')
        .replace(/(してください)(?=(では|それでは|さて|まず|次に|続いて|最後に|教科書|ノート|黒板|隣|先生|答え|復習問題|問い|問|問題|解けた人|早くも|全部|何の|何を|何が))/g, '$1。')
        .replace(/(しましょう|ましょう)(?=(では|それでは|さて|まず|次に|続いて|最後に|教科書|ノート|黒板|隣|先生|答え|復習問題|問い|問|問題|解けた人|早くも|全部))/g, '$1。')
        .replace(/(確認します|発表します|始めます|行います|解きます|ときます)(?=(こんにちは|では|それでは|さて|まず|次に|続いて|最後に|教科書|ノート|黒板|隣|先生|かっこ|問題|復習問題|問い|問|答え|解けた人|早くも|全部))/g, '$1。')
        .replace(/(開きましょう|まとめてみましょう|話し合ってください|見合ってください|見せに来ましょう|持ってきましょう|見せに来てください)(?=(では|それでは|さて|まず|次に|続いて|最後に|教科書|ノート|黒板|隣|先生|前回|今日|復習問題|問い|問|答え|早くも|全部))/g, '$1。')
        .replace(/(欲しいです|いますね|でしょうか|ましたか|できましたか)(?=(では|それでは|さて|まず|次に|続いて|最後に|先生|解けた人|復習問題|問い|問|答え|早くも|全部|指|何の|何を|何が))/g, '$1。')
        .replace(/(教科書を閉じて)(?=(今|今日|まず|次に|隣))/g, '$1。')
        .replace(/([。！？!?])(?=(こんにちは|では|それでは|さて|まず|次に|続いて|最後に|教科書|ノート|黒板|隣|先生|復習問題|問い|問|答え|問題|早くも|全部))/g, '$1 ')
        .replace(/(1つは|一つは|もう一つは|もう1つは)(?=\S)/g, '$1 ')
        .replace(/([0-9０-９]+)\s*ページ/g, '$1ページ')
        .replace(/([0-9０-９]+)\s*分/g, '$1分')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function prepareSpeechTextForLessonChunk(value) {
      return prepareJapaneseForLessonText(normalizeLessonMathText(value))
        .replace(/[、,]+$/g, '')
        .replace(/^(こんにちは|おはようございます|こんばんは)(?=[ぁ-んァ-ヶ一-龠々ー])/g, '$1。')
        .replace(/(ますか|ましたか|ですか|でしょうか|ます|ました|です|でした|ください|ましょう|でしょう|開きましょう|始めます|行います|解きます|ときます|欲しいです|持ってきましょう|見せに来てください)(?=(こんにちは|これから|さて|では|それでは|まず|次に|続いて|最後に|先ほど|前回|今日|教科書|ノート|頭の中|隣|黒板|時間|みんな|自分|整理|確認|問題|答え|ポイント|かっこ|復習問題|問い|問|途中|先生|解けた人|早くも|全部|指|何の|何を|何が))/g, '$1。')
        .replace(/(ください|ましょう|ます|ました|です|でした|いますね)(?=(もし|できれば|できた人|分からない|終わった人|解けた人|先生に|並んでいる|お友達|早くも|全部|何の|何を|何が))/g, '$1。')
        .replace(/(さて|では|それでは)(?=(教科書|復習問題|問い|問|答え|解けた人|先生))/g, '$1、')
        .replace(/([！？!?])(?=[ぁ-んァ-ヶ一-龠々ー])/g, '$1。')
        .replace(/。+/g, '。')
        .trim();
    }

    function countLessonSentences(value) {
      const text = normalizeText(value);
      const matches = text.match(/[。！？!?]/g);
      return matches ? matches.length : 0;
    }

    function takeLessonSentenceChunk(value, count) {
      const text = normalizeText(value);
      let seen = 0;

      for (let index = 0; index < text.length; index += 1) {
        if (/[。！？!?]/.test(text.charAt(index))) {
          seen += 1;
          if (seen >= count) {
            return {
              chunk: text.slice(0, index + 1).trim(),
              rest: text.slice(index + 1).trim()
            };
          }
        }
      }

      return {
        chunk: '',
        rest: text
      };
    }

    function splitLessonMicTextForSend(value) {
      const text = normalizeText(value);
      const maxLength = 220;
      const chunks = [];
      let rest = text;

      if (!rest) return chunks;

      while (rest.length > maxLength) {
        let cutAt = -1;
        const searchArea = rest.slice(0, maxLength + 1);

        ['。', '！', '？', '!', '?', '、', '，', ','].forEach((mark) => {
          const index = searchArea.lastIndexOf(mark);
          if (index > cutAt) cutAt = index;
        });

        if (cutAt < 80) {
          const softMatches = Array.from(searchArea.matchAll(/(してください|しましょう|ましょう|ます|ました|です|でした|ください)/g));
          const soft = softMatches.reverse().find((match) => match.index >= 80);
          cutAt = soft ? soft.index + soft[0].length - 1 : maxLength;
        }

        chunks.push(rest.slice(0, cutAt + 1).trim());
        rest = rest.slice(cutAt + 1).trim();
      }

      if (rest) chunks.push(rest);
      return chunks.filter(Boolean);
    }

    function scheduleSilenceFlush() {
      clearTimeout(silenceTimer);
      clearTimeout(idleFlushTimer);

      silenceTimer = setTimeout(() => {
        setStatus('音声入力中です。少し間が空いたら、残りを授業ログに確定します。', false);
      }, LESSON_MIC_IDLE_STATUS_MS);

      idleFlushTimer = setTimeout(() => {
        flushPendingText(true);
      }, LESSON_MIC_IDLE_FLUSH_MS);
    }

    function addPendingText(text) {
      const safeText = prepareSpeechTextForLessonChunk(text);
      if (!safeText) return;

      splitLessonMicTextForSend(safeText).forEach((chunk) => {
        const historyId = addSentHistory(chunk, 'sending');
        sendLessonText(chunk, true, historyId);
      });
    }

    function flushPendingText(force) {
      if (!force) {
        return;
      }

      clearTimeout(silenceTimer);
      clearTimeout(idleFlushTimer);
      sendLessonText('', true, '');
    }

    function sendLessonText(text, force, historyId) {
      if (!text && !force) return;

      if (text) {
        setStatus('音声を送信しています。', false);
      } else if (force) {
        setStatus('残りの音声を授業ログに確定します。', false);
      }

      if (text && historyId) {
        updateSentHistoryState(historyId, incrementSentHistoryAttempt(historyId) > 1 ? 'retrying' : 'sending');
      }

      lessonSendChain = lessonSendChain.catch(() => true).then(() => {
        return postToGas('appendLessonMicLog', {
            roomId: roomId,
            roomKey: roomKey,
            sessionId: sessionId,
            subject: subject,
            jaText: text,
            force: force ? '1' : '0',
            clientEventId: historyId || ''
          }, 15000).then((result) => {
          if (!result || !result.ok) {
            throw new Error(result && result.message ? result.message : '授業ログを保存できませんでした。');
          }

          if (result.roomKey) {
            roomKey = String(result.roomKey || roomKey).trim();
            hasOpenedRoom = true;
            saveExternalMicSettings();
            startLessonHeartbeat();
          }

          if (result.log && result.log.roomKey) {
            roomKey = String(result.log.roomKey || roomKey).trim();
            hasOpenedRoom = true;
            saveExternalMicSettings();
            startLessonHeartbeat();
          }

          if (text && result.duplicate) {
            sentCount += 1;
            sentCountEl.textContent = sentCount + '件';
            markSentHistoryDone(historyId);
            setStatus('この文はすでに保存済みです。', false);
            return;
          }

          if (text && result.ignored) {
            throw new Error(result.message || '授業ログが保存されませんでした。');
          }

          if (text) {
            sentCount += 1;
            sentCountEl.textContent = sentCount + '件';
            markSentHistoryDone(historyId);
            setStatus('送信しました。生徒側に順番に表示されます。', false);
          } else if (force) {
            setStatus('残りの音声を授業ログに確定しました。', false);
          }
        });
      }).catch((error) => {
        if (text) {
          const attempts = sentHistory.find((row) => row.id === historyId);
          const attemptCount = attempts ? Number(attempts.attempts || 0) : 0;

          window.setTimeout(function () {
            confirmLessonTextSaved(historyId).then(function (saved) {
              if (saved) {
                sentCount += 1;
                sentCountEl.textContent = sentCount + '件';
                markSentHistoryDone(historyId);
                setStatus('保存済みを確認しました。マイクはそのまま続けられます。', false);
                return;
              }

              if (attemptCount < SEND_RETRY_MAX) {
                updateSentHistoryState(historyId, 'retrying', error && error.message ? error.message : String(error || ''));
                setStatus(getConnectionHelpMessage(), true);
                window.setTimeout(function () {
                  sendLessonText(text, true, historyId);
                }, SEND_RETRY_BASE_MS * Math.max(1, attemptCount));
                return;
              }

              updateSentHistoryState(historyId, 'error', error && error.message ? error.message : String(error || ''));
              setStatus(getConnectionHelpMessage() + ' 赤い未送信カードは「この文を再送する」を押せます。', true);
            });
          }, 2200);

          updateSentHistoryState(historyId, 'checking', error && error.message ? error.message : String(error || ''));
          setStatus('送信結果を確認しています。マイクは止めずに続けて大丈夫です。', false);
          return;
        } else if (force) {
          setStatus(getConnectionHelpMessage(), true);
        }
      });
    }

    function createRecognition() {
      const rec = new SpeechRecognition();
      rec.lang = 'ja-JP';
      rec.continuous = true;
      rec.interimResults = false;

      rec.onstart = () => {
        running = true;
        setMicPreparing(false);
        startButton.classList.add('is-running');
        startButton.setAttribute('aria-label', '停止');
        startButton.innerHTML = '<i class="fa-solid fa-stop" aria-hidden="true"></i>';
        historyActionsEl.hidden = false;
        setStatus('マイク入力中です。話した文から順に送信します。', false);
        setHistoryEmptyMessage('マイク入力中です。話した文がここに表示され、つたえる君へ送信されます。');
      };

      rec.onresult = (event) => {
        for (let i = event.resultIndex; i < event.results.length; i += 1) {
          if (!event.results[i].isFinal) continue;
          const transcript = prepareSpeechTextForLessonChunk(event.results[i][0].transcript);
          addPendingText(transcript);
        }
      };

      rec.onerror = (event) => {
        setMicPreparing(false);
        setHistoryEmptyMessage('右のマイクボタンを押してから話すと、下に文が入ります。その後、アプリ側に送信されて、生徒側に表示されます。');
        setStatus('音声認識で問題が起きました: ' + (event.error || 'unknown'), true);
      };

      rec.onend = () => {
        const shouldRestart = running;
        if (shouldRestart) {
          setTimeout(() => {
            try {
              rec.start();
            } catch (error) {
              setStatus('マイクの再開に失敗しました。もう一度マイク開始を押してください。', true);
              running = false;
              setMicPreparing(false);
              startButton.classList.remove('is-running');
              startButton.setAttribute('aria-label', 'マイク開始');
              startButton.innerHTML = '<i class="fa-solid fa-microphone" aria-hidden="true"></i>';
            }
          }, 400);
          return;
        }

        setMicPreparing(false);
        startButton.classList.remove('is-running');
        startButton.setAttribute('aria-label', 'マイク開始');
        startButton.innerHTML = '<i class="fa-solid fa-microphone" aria-hidden="true"></i>';
        setStatus('停止中', false);
      };

      return rec;
    }

    function startMic() {
      if (!SpeechRecognition) {
        setStatus('このブラウザは音声認識に対応していません。Google Chromeで開いてください。', true);
        return;
      }

      saveExternalMicSettings();

      if (!roomId || !sessionId) {
        if (!roomId) {
          initializeExternalRoomId().then((ready) => {
            if (ready) startMic();
          });
          return;
        }
        setStatus('セッションを準備できませんでした。ページを再読み込みしてください。', true);
        return;
      }

      setMicPreparing(true);

      ensureMicrophonePermission().then((allowed) => {
        if (!allowed) {
          setMicPreparing(false);
          return;
        }

        recognition = recognition || createRecognition();

        try {
          recognition.start();
        } catch (error) {
          setMicPreparing(false);
          setHistoryEmptyMessage('右のマイクボタンを押してから話すと、下に文が入ります。その後、アプリ側に送信されて、生徒側に表示されます。');
          setStatus('マイクを開始できませんでした。ページを再読み込みしてもう一度試してください。', true);
        }
      }).catch(() => {
        setMicPreparing(false);
        setStatus('マイクを準備できませんでした。通信とマイク許可を確認してください。', true);
      });
    }

    function stopMic() {
      running = false;
      flushPendingText(true);
      if (recognition) recognition.stop();
    }

    startButton.addEventListener('click', () => {
      if (running) {
        stopMic();
      } else {
        startMic();
      }
    });

    historyOldestButton.addEventListener('click', () => {
      historyOrder = 'oldest';
      renderSentHistory();
    });

    historyNewestButton.addEventListener('click', () => {
      historyOrder = 'newest';
      renderSentHistory();
    });

    historyListEl.addEventListener('click', (event) => {
      const retryButton = event.target && event.target.closest
        ? event.target.closest('[data-retry-history]')
        : null;
      if (!retryButton) return;
      retrySentHistory(retryButton.getAttribute('data-retry-history'));
    });

    window.addEventListener('beforeunload', () => {
      flushPendingText(true);
      closeExternalLessonRoom();
    });

    document.addEventListener('gesturestart', (event) => {
      event.preventDefault();
    }, { passive: false });

    document.addEventListener('touchmove', (event) => {
      if (event.touches && event.touches.length > 1) {
        event.preventDefault();
      }
    }, { passive: false });

    renderSentHistory();
    roomStartupRetry.addEventListener('click', () => {
      initializeExternalRoomId();
    });
    initializeExternalRoomId();
  </script>
</body>
</html>
