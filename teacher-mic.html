<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>つたえる君 外部マイク</title>
  <style>
    :root {
      --bg: #020807;
      --panel: #061411;
      --panel-soft: #09231d;
      --text: #f7fffc;
      --muted: #a9c8bf;
      --main: #28d7c3;
      --main-dark: #12a99a;
      --line: rgba(40, 215, 195, 0.42);
      --line-strong: #28d7c3;
      --accent: #8fb3ff;
      --danger: #ff7890;
      --shadow: 0 22px 80px rgba(0, 0, 0, 0.46);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 14% 0%, rgba(40, 215, 195, 0.18), transparent 30%),
        radial-gradient(circle at 90% 18%, rgba(143, 179, 255, 0.14), transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 16px;
      overflow: hidden;
    }

    main {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 14px;
      width: min(1200px, 100%);
      height: calc(100vh - 32px);
      margin: 0 auto;
      background: transparent;
    }

    p {
      color: var(--muted);
      line-height: 1.8;
    }

    .status {
      position: absolute;
      right: 26px;
      bottom: 84px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      max-width: min(62vw, 640px);
      min-height: 36px;
      border-radius: 999px;
      background: rgba(9, 35, 29, 0.94);
      color: var(--main);
      border: 1px solid var(--line);
      padding: 7px 12px;
      font-weight: 800;
      margin: 0;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.34);
    }

    .status.is-error {
      background: rgba(60, 12, 22, 0.96);
      color: var(--danger);
    }

    .controls {
      display: none;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
    }

    .main-button {
      background: var(--main);
      color: #002a25;
      box-shadow: 0 18px 42px rgba(40, 215, 195, 0.26);
    }

    .sub-button {
      background: rgba(9, 35, 29, 0.92);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .sub-button.is-active {
      background: var(--main);
      color: #002a25;
      border-color: var(--main);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0 0 10px;
    }

    .meta div {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 11px;
      background: rgba(6, 20, 17, 0.88);
    }

    .meta small {
      display: inline;
      color: var(--muted);
      font-weight: 700;
      margin-right: 6px;
    }

    .meta strong {
      color: var(--text);
    }

    textarea {
      width: 100%;
      height: 100%;
      min-height: 180px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px 104px 22px 18px;
      font-size: clamp(1.06rem, 2.2vw, 1.55rem);
      line-height: 1.9;
      color: var(--text);
      background: rgba(1, 8, 7, 0.86);
      outline: none;
    }

    textarea:focus {
      border-color: var(--main);
      box-shadow: 0 0 0 4px rgba(40, 215, 195, 0.14);
    }

    .pending {
      min-height: 44px;
      margin-top: 10px;
      padding: 10px 12px;
      border: 1px dashed var(--line);
      border-radius: 16px;
      color: var(--muted);
      background: rgba(9, 35, 29, 0.62);
      line-height: 1.7;
    }

    .history {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(6, 20, 17, 0.82);
      box-shadow: var(--shadow);
      padding: 16px;
      min-height: 0;
      overflow: hidden;
    }

    .history-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .history-head h2 {
      margin: 0;
      color: var(--text);
      font-size: 1.1rem;
    }

    .history-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .history-actions button {
      padding: 10px 14px;
      font-size: 0.9rem;
    }

    .history-list {
      display: grid;
      gap: 10px;
      align-content: start;
      max-height: calc(100% - 54px);
      overflow: auto;
      padding-right: 4px;
    }

    .history-empty {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .history-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(2, 8, 7, 0.82);
      padding: 12px 14px;
    }

    .history-card small {
      display: block;
      color: var(--main);
      font-weight: 800;
      margin-bottom: 6px;
    }

    .history-card p {
      margin: 0;
      color: var(--text);
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .input-area {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: rgba(6, 20, 17, 0.86);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .textarea-shell {
      position: relative;
      height: min(35vh, 320px);
      min-height: 190px;
    }

    .mic-toggle {
      position: absolute;
      right: 18px;
      bottom: 18px;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      padding: 0;
      font-size: 1.55rem;
    }

    .mic-toggle.is-running {
      background: var(--danger);
      color: #fff;
      box-shadow: 0 18px 42px rgba(255, 120, 144, 0.24);
    }

    @media (max-width: 640px) {
      body {
        padding: 10px;
      }

      main {
        height: calc(100vh - 20px);
        gap: 10px;
      }

      .meta {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }

      .history-head {
        align-items: stretch;
      }

      .history-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .history {
        padding: 12px;
      }

      .input-area {
        padding: 10px;
      }

      .textarea-shell {
        height: 34vh;
        min-height: 170px;
      }

      .status {
        right: 20px;
        bottom: 78px;
        left: 20px;
        max-width: none;
      }

      .mic-toggle {
        width: 64px;
        height: 64px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="history" aria-labelledby="history-title">
      <div class="history-head">
        <h2 id="history-title">送信した文</h2>
        <div class="history-actions">
          <button class="sub-button" type="button" id="history-oldest-button">最初から並べる</button>
          <button class="sub-button is-active" type="button" id="history-newest-button">最新文から並べる</button>
        </div>
      </div>
      <div class="history-list" id="history-list">
        <p class="history-empty">まだ送信した文はありません。</p>
      </div>
    </section>

    <section class="input-area" aria-label="音声入力">
      <div class="meta">
        <div>
          <small>ルーム</small>
          <strong id="room-id-label">未設定</strong>
        </div>
        <div>
          <small>教科</small>
          <strong id="subject-label">math</strong>
        </div>
        <div>
          <small>送信</small>
          <strong id="sent-count-label">0件</strong>
        </div>
      </div>

      <div class="textarea-shell">
        <textarea id="text" placeholder="マイク開始を押して話してください。送信した文は上の履歴に残ります。"></textarea>
        <div class="status" id="status">停止中</div>
        <button class="main-button mic-toggle" type="button" id="start-button" aria-label="マイク開始">
          <span aria-hidden="true">🎙</span>
        </button>
      </div>

      <div class="pending" id="pending">送信待ちの内容はありません。</div>
    </section>
  </main>

  <script>
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzBSH540vZK4G62twUfsketq9Pi2RZFocmfcNFwdEVV-IPqHH1Izb0VAFW_SRtN4nbf/exec';
    const LESSON_MIC_IDLE_STATUS_MS = 4500;
    const LESSON_MIC_IDLE_FLUSH_MS = 10000;
    const LESSON_MIC_CHUNK_SENTENCE_COUNT = 3;
    const LESSON_MIC_MIN_CHARS = 2;
    const KOTOBA_MIC_CORRECTIONS = [
      [/おはようございません/g, 'おはようございます'],
      [/前回の復讐/g, '前回の復習'],
      [/復讐/g, '復習'],
      [/副習/g, '復習'],
      [/とあ同士/g, '隣の人同士'],
      [/問あ同士/g, '隣の人同士'],
      [/となり同士/g, '隣同士'],
      [/となりどうし/g, '隣同士'],
      [/隣どうし/g, '隣同士'],
      [/隣の人どうし/g, '隣の人同士'],
      [/隣の人と同士/g, '隣の人同士'],
      [/隣でどうし復習/g, '隣同士で復習'],
      [/隣でどうし/g, '隣同士で'],
      [/同士で前回やった復習/g, '隣同士で前回やった復習'],
      [/お隣の人/g, '隣の人'],
      [/話しあい/g, '話し合い'],
      [/発表しあい/g, '発表し合い'],
      [/発表し合いましょうさぁ/g, '発表し合いましょう。さぁ'],
      [/話し合いましょうさぁ/g, '話し合いましょう。さぁ'],
      [/始めましょう隣/g, '始めましょう。隣'],
      [/しましょうさぁ/g, 'しましょう。さぁ'],
      [/くださいさぁ/g, 'ください。さぁ'],
      [/くださいさて/g, 'ください。さて'],
      [/くださいでは/g, 'ください。では'],
      [/ましょうさて/g, 'ましょう。さて'],
      [/ましょうでは/g, 'ましょう。では'],
      [/ですさて/g, 'です。さて'],
      [/ですでは/g, 'です。では'],
      [/ますさて/g, 'ます。さて'],
      [/ますでは/g, 'ます。では'],
      [/さぁ時間/g, 'さぁ、時間'],
      [/さぁ5つ/g, 'さぁ、5つ'],
      [/さあ時間/g, 'さぁ、時間'],
      [/そしてそして/g, 'そして'],
      [/それではでは/g, 'それでは'],
      [/鳥の子/g, '問いの5'],
      [/鳥の5/g, '問いの5'],
      [/問の子/g, '問いの5'],
      [/土肥の/g, '問いの'],
      [/問いの子/g, '問いの5'],
      [/トイレの([0-9０-９]+)/g, '問いの$1'],
      [/トイレ/g, '問い'],
      [/遠いのに/g, '問いの2'],
      [/遠いの([0-9０-９]+)/g, '問いの$1'],
      [/遠いの/g, '問いの'],
      [/問いの位置を読んで/g, '問いの1を解いて'],
      [/問いの位置/g, '問いの1'],
      [/問題の一/g, '問題の1'],
      [/問題の二/g, '問題の2'],
      [/問題の三/g, '問題の3'],
      [/問題の四/g, '問題の4'],
      [/問題の五/g, '問題の5'],
      [/かっこ\s*([0-9０-９]+)番/g, 'かっこ$1番'],
      [/溶けた人/g, '解けた人'],
      [/溶けたら/g, '解けたら'],
      [/溶けた/g, '解けた'],
      [/溶ける/g, '解ける'],
      [/解けますた/g, '解けました'],
      [/溶きましょう/g, '解きましょう'],
      [/溶いて/g, '解いて'],
      [/溶く/g, '解く'],
      [/先生に店に来て/g, '先生に見せに来て'],
      [/問題もの丸つけ/g, '問題も丸つけ'],
      [/黒板から左側/g, '黒板に向かって左側'],
      [/黒板の左側/g, '黒板に向かって左側'],
      [/黒板から右側/g, '黒板に向かって右側'],
      [/黒板の右側/g, '黒板に向かって右側'],
      [/黒板に向って/g, '黒板に向かって'],
      [/共通因数が取れない/g, '共通因数でくくれない'],
      [/共通因数で括れない/g, '共通因数でくくれない'],
      [/共通因数でくれる/g, '共通因数でくくれる'],
      [/共通因数でくれない/g, '共通因数でくくれない'],
      [/共通員数/g, '共通因数'],
      [/共通因子/g, '共通因数'],
      [/因数分会/g, '因数分解'],
      [/印数分解/g, '因数分解'],
      [/因数分かい/g, '因数分解'],
      [/展開公式/g, '展開の公式'],
      [/平方根号/g, '根号'],
      [/平方婚/g, '平方根'],
      [/平方今/g, '平方根'],
      [/1時\s*間数/g, '一次関数'],
      [/1時間数/g, '一次関数'],
      [/一時間数/g, '一次関数'],
      [/一次感数/g, '一次関数'],
      [/1時間進む内容/g, '一次関数の内容'],
      [/1時間数内容/g, '一次関数の内容'],
      [/二次感数/g, '二次関数'],
      [/どんな少数/g, 'どんな小数'],
      [/少数だった/g, '小数だった'],
      [/少数第/g, '小数第'],
      [/絶対地/g, '絶対値'],
      [/絶対知/g, '絶対値'],
      [/対象移動/g, '対称移動'],
      [/対象の軸/g, '対称の軸'],
      [/照明/g, '証明'],
      [/代乳/g, '代入'],
      [/台入/g, '代入'],
      [/角率/g, '確率'],
      [/相地/g, '相似'],
      [/総時/g, '相似'],
      [/号動/g, '合同'],
      [/変域/g, '範囲'],
      [/自分のプラス/g, '自分の力'],
      [/頭の中に入っていない/g, '理解できていない'],
      [/頭に入っていない/g, '理解できていない'],
      [/まず1つ目の確認をします/g, 'まず1つ目を確認します'],
      [/今日の目標は平方根の理解をしようです/g, '今日の目標は平方根を理解することです'],
      [/今日の目標は(.+?)の理解をしようです/g, '今日の目標は$1を理解することです'],
      [/理解をしようです/g, '理解することです'],
      [/√\s*([0-9０-９]+)と言うもの/g, '√$1というもの'],
      [/√\s*([0-9０-９]+)と言う/g, '√$1という'],
      [/についてどんな理解をしていますか√/g, 'についてどんな理解をしていますか。√'],
      [/√\s*([0-9０-９]+)\s*=\s*2乗して/g, '√$1は2乗して'],
      [/√\s*([0-9０-９]+)\s*は二乗して/g, '√$1は2乗して'],
      [/因数分解\s+1つは/g, '因数分解。1つは'],
      [/仕方1つは/g, '仕方。1つは'],
      [/場合の対応の仕方1つは/g, '場合の対応の仕方。1つは'],
      [/何個あげる/g, '何個挙げる'],
      [/何個あげられる/g, '何個挙げられる'],
      [/ヒントを上げて/g, 'ヒントをあげて'],
      [/是非答えではなく/g, '答えではなく'],
      [/丸をつけてもらいます/g, '丸をつけてもらいましょう'],
      [/先生に持ってきて丸/g, '先生のところに持ってきて、丸'],
      [/解き終わってない/g, '解き終わっていない']
    ];

    const params = new URLSearchParams(location.search);
    const roomId = params.get('roomId') || '';
    const roomKey = params.get('roomKey') || '';
    const sessionId = params.get('sessionId') || '';
    const subject = params.get('subject') || 'math';

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const startButton = document.getElementById('start-button');
    const statusEl = document.getElementById('status');
    const textEl = document.getElementById('text');
    const pendingEl = document.getElementById('pending');
    const sentCountEl = document.getElementById('sent-count-label');
    const historyListEl = document.getElementById('history-list');
    const historyOldestButton = document.getElementById('history-oldest-button');
    const historyNewestButton = document.getElementById('history-newest-button');

    let recognition = null;
    let running = false;
    let pendingText = '';
    let silenceTimer = 0;
    let idleFlushTimer = 0;
    let sentCount = 0;
    let sentHistory = [];
    let historyOrder = 'newest';

    document.getElementById('room-id-label').textContent = roomId || '未設定';
    document.getElementById('subject-label').textContent = subject;

    function setStatus(message, isError) {
      statusEl.textContent = message;
      statusEl.classList.toggle('is-error', Boolean(isError));
    }

    function formatHistoryTime(date) {
      return [
        String(date.getHours()).padStart(2, '0'),
        String(date.getMinutes()).padStart(2, '0'),
        String(date.getSeconds()).padStart(2, '0')
      ].join(':');
    }

    function renderSentHistory() {
      const rows = historyOrder === 'newest'
        ? sentHistory.slice().reverse()
        : sentHistory.slice();

      historyOldestButton.classList.toggle('is-active', historyOrder === 'oldest');
      historyNewestButton.classList.toggle('is-active', historyOrder === 'newest');

      if (!rows.length) {
        historyListEl.innerHTML = '<p class="history-empty">まだ送信した文はありません。</p>';
        return;
      }

      historyListEl.innerHTML = rows.map((item) => {
        return [
          '<article class="history-card">',
          '<small>#' + item.index + ' ' + item.time + '</small>',
          '<p>' + escapeHtml(item.text) + '</p>',
          '</article>'
        ].join('');
      }).join('');
    }

    function addSentHistory(text) {
      const safeText = normalizeText(text);
      if (!safeText) return;

      sentHistory.push({
        index: sentHistory.length + 1,
        time: formatHistoryTime(new Date()),
        text: safeText
      });
      renderSentHistory();
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function normalizeText(value) {
      return String(value || '')
        .replace(/[\u00a0\u3000]/g, ' ')
        .replace(/\s+/g, ' ')
        .replace(/([ぁ-んァ-ヶ一-龠々ー])\s+(?=[ぁ-んァ-ヶ一-龠々ー])/g, '$1')
        .replace(/([ぁ-んァ-ヶ一-龠々ー])\s+(?=[、。！？!?])/g, '$1')
        .replace(/([、。！？!?])\s+(?=[ぁ-んァ-ヶ一-龠々ー])/g, '$1')
        .trim();
    }

    function applyMicCorrectionRules(text) {
      return KOTOBA_MIC_CORRECTIONS.reduce((current, rule) => {
        return current.replace(rule[0], rule[1]);
      }, String(text || ''));
    }

    function normalizeLessonMathText(text) {
      const safeText = normalizeText(text);
      if (!safeText) return '';

      return applyMicCorrectionRules(safeText)
        .replace(/ルート\s*([0-9０-９]+)/g, '√$1')
        .replace(/√\s*([0-9０-９]+)/g, '√$1')
        .replace(/[（(]\s*[xX]\s*[+＋]\s*([A-Za-zＡ-Ｚａ-ｚ])\s*[）)]?\s*[（(]\s*[xX]\s*[+＋]\s*([A-Za-zＡ-Ｚａ-ｚ])\s*[）)]/g, '(x+$1)(x+$2)')
        .replace(/[（(]\s*[xX]\s*[+＋]\s*([A-Za-zＡ-Ｚａ-ｚ])\s+[（(]\s*[xX]\s*[+＋]\s*([A-Za-zＡ-Ｚａ-ｚ])(?=の|を|で|、|。|$)/g, '(x+$1)(x+$2)')
        .replace(/[（(]\s*[xX]\s*[+＋]\s*([A-Za-zＡ-Ｚａ-ｚ])\s*(?:の)?2乗/g, '(x+$1)の2乗')
        .replace(/[xX]\s*[+＋]\s*([A-Za-zＡ-Ｚａ-ｚ])/g, 'x+$1')
        .replace(/\s*([＋+＝=×÷])\s*/g, '$1')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function prepareJapaneseForLessonText(text) {
      const safeText = normalizeText(text);
      if (!safeText) return '';

      return safeText
        .replace(/(こんにちは|おはようございます|こんばんは)(?=(これから|さて|では|それでは|まず|次に|続いて|最後に|教科書|ノート|黒板|復習問題|問い|問|問題))/g, '$1。')
        .replace(/(してください)(?=(では|それでは|さて|まず|次に|続いて|最後に|教科書|ノート|黒板|隣|先生|答え|復習問題|問い|問|問題|解けた人|早くも|全部|何の|何を|何が))/g, '$1。')
        .replace(/(しましょう|ましょう)(?=(では|それでは|さて|まず|次に|続いて|最後に|教科書|ノート|黒板|隣|先生|答え|復習問題|問い|問|問題|解けた人|早くも|全部))/g, '$1。')
        .replace(/(確認します|発表します|始めます|行います|解きます|ときます)(?=(こんにちは|では|それでは|さて|まず|次に|続いて|最後に|教科書|ノート|黒板|隣|先生|かっこ|問題|復習問題|問い|問|答え|解けた人|早くも|全部))/g, '$1。')
        .replace(/(開きましょう|まとめてみましょう|話し合ってください|見合ってください|見せに来ましょう|持ってきましょう|見せに来てください)(?=(では|それでは|さて|まず|次に|続いて|最後に|教科書|ノート|黒板|隣|先生|前回|今日|復習問題|問い|問|答え|早くも|全部))/g, '$1。')
        .replace(/(欲しいです|いますね|でしょうか|ましたか|できましたか)(?=(では|それでは|さて|まず|次に|続いて|最後に|先生|解けた人|復習問題|問い|問|答え|早くも|全部|指|何の|何を|何が))/g, '$1。')
        .replace(/(教科書を閉じて)(?=(今|今日|まず|次に|隣))/g, '$1。')
        .replace(/([。！？!?])(?=(こんにちは|では|それでは|さて|まず|次に|続いて|最後に|教科書|ノート|黒板|隣|先生|復習問題|問い|問|答え|問題|早くも|全部))/g, '$1 ')
        .replace(/(1つは|一つは|もう一つは|もう1つは)(?=\S)/g, '$1 ')
        .replace(/([0-9０-９]+)\s*ページ/g, '$1ページ')
        .replace(/([0-9０-９]+)\s*分/g, '$1分')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function prepareSpeechTextForLessonChunk(value) {
      return prepareJapaneseForLessonText(normalizeLessonMathText(value))
        .replace(/[、,]+$/g, '')
        .replace(/^(こんにちは|おはようございます|こんばんは)(?=[ぁ-んァ-ヶ一-龠々ー])/g, '$1。')
        .replace(/(ますか|ましたか|ですか|でしょうか|ます|ました|です|でした|ください|ましょう|でしょう|開きましょう|始めます|行います|解きます|ときます|欲しいです|持ってきましょう|見せに来てください)(?=(こんにちは|これから|さて|では|それでは|まず|次に|続いて|最後に|先ほど|前回|今日|教科書|ノート|頭の中|隣|黒板|時間|みんな|自分|整理|確認|問題|答え|ポイント|かっこ|復習問題|問い|問|途中|先生|解けた人|早くも|全部|指|何の|何を|何が))/g, '$1。')
        .replace(/(ください|ましょう|ます|ました|です|でした|いますね)(?=(もし|できれば|できた人|分からない|終わった人|解けた人|先生に|並んでいる|お友達|早くも|全部|何の|何を|何が))/g, '$1。')
        .replace(/(さて|では|それでは)(?=(教科書|復習問題|問い|問|答え|解けた人|先生))/g, '$1、')
        .replace(/([！？!?])(?=[ぁ-んァ-ヶ一-龠々ー])/g, '$1。')
        .replace(/。+/g, '。')
        .trim();
    }

    function countLessonSentences(value) {
      const text = normalizeText(value);
      const matches = text.match(/[。！？!?]/g);
      return matches ? matches.length : 0;
    }

    function takeLessonSentenceChunk(value, count) {
      const text = normalizeText(value);
      let seen = 0;

      for (let index = 0; index < text.length; index += 1) {
        if (/[。！？!?]/.test(text.charAt(index))) {
          seen += 1;
          if (seen >= count) {
            return {
              chunk: text.slice(0, index + 1).trim(),
              rest: text.slice(index + 1).trim()
            };
          }
        }
      }

      return {
        chunk: '',
        rest: text
      };
    }

    function appendVisibleText(text) {
      const safeText = normalizeText(text);
      if (!safeText) return;
      textEl.value = safeText;
      textEl.scrollTop = textEl.scrollHeight;
    }

    function updatePendingView() {
      pendingEl.textContent = pendingText
        ? 'GAS側で確定待ち: ' + pendingText
        : 'GAS側で3つ分たまると授業ログとして確定します。';
    }

    function scheduleSilenceFlush() {
      clearTimeout(silenceTimer);
      clearTimeout(idleFlushTimer);

      silenceTimer = setTimeout(() => {
        setStatus('音声入力中です。10秒ほど次の音声がなければ、残りを授業ログに確定します。', false);
      }, LESSON_MIC_IDLE_STATUS_MS);

      idleFlushTimer = setTimeout(() => {
        flushPendingText(true);
      }, LESSON_MIC_IDLE_FLUSH_MS);
    }

    function addPendingText(text) {
      const safeText = prepareSpeechTextForLessonChunk(text);
      if (!safeText) return;

      pendingText = safeText;
      updatePendingView();
      sendLessonText(safeText, false);
      addSentHistory(safeText);
      pendingText = '';
      textEl.value = '';
      updatePendingView();
      scheduleSilenceFlush();
    }

    function flushPendingText(force) {
      if (!force) {
        return;
      }

      pendingText = '';
      updatePendingView();
      clearTimeout(silenceTimer);
      clearTimeout(idleFlushTimer);
      sendLessonText('', true);
    }

    function sendLessonText(text, force) {
      const body = new URLSearchParams();
      body.set('action', 'appendLessonMicLog');
      body.set('roomId', roomId);
      body.set('roomKey', roomKey);
      body.set('sessionId', sessionId);
      body.set('subject', subject);
      body.set('jaText', text);
      body.set('force', force ? '1' : '0');

      if (!text && !force) return;

      fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors',
        keepalive: true,
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
        },
        body
      });

      if (text) {
        sentCount += 1;
        sentCountEl.textContent = sentCount + '件';
        setStatus('GASへ送りました。3つ分で授業ログに確定します。', false);
      } else if (force) {
        setStatus('残りの音声を授業ログに確定します。', false);
      }
    }

    function createRecognition() {
      const rec = new SpeechRecognition();
      rec.lang = 'ja-JP';
      rec.continuous = true;
      rec.interimResults = false;

      rec.onstart = () => {
        running = true;
        startButton.classList.add('is-running');
        startButton.setAttribute('aria-label', '停止');
        startButton.innerHTML = '<span aria-hidden="true">■</span>';
        setStatus('マイク入力中です。', false);
      };

      rec.onresult = (event) => {
        for (let i = event.resultIndex; i < event.results.length; i += 1) {
          if (!event.results[i].isFinal) continue;
          const transcript = prepareSpeechTextForLessonChunk(event.results[i][0].transcript);
          appendVisibleText(transcript);
          addPendingText(transcript);
        }
      };

      rec.onerror = (event) => {
        setStatus('音声認識で問題が起きました: ' + (event.error || 'unknown'), true);
      };

      rec.onend = () => {
        const shouldRestart = running;
        if (shouldRestart) {
          setTimeout(() => {
            try {
              rec.start();
            } catch (error) {
              setStatus('マイクの再開に失敗しました。もう一度マイク開始を押してください。', true);
              running = false;
              startButton.disabled = false;
              startButton.classList.remove('is-running');
              startButton.setAttribute('aria-label', 'マイク開始');
              startButton.innerHTML = '<span aria-hidden="true">🎙</span>';
            }
          }, 400);
          return;
        }

        startButton.disabled = false;
        startButton.classList.remove('is-running');
        startButton.setAttribute('aria-label', 'マイク開始');
        startButton.innerHTML = '<span aria-hidden="true">🎙</span>';
        setStatus('停止中', false);
      };

      return rec;
    }

    function startMic() {
      if (!SpeechRecognition) {
        setStatus('このブラウザは音声認識に対応していません。Google Chromeで開いてください。', true);
        return;
      }

      if (!roomId || !roomKey || !sessionId) {
        setStatus('ルーム情報がありません。本体アプリの授業モードから開いてください。', true);
        return;
      }

      recognition = recognition || createRecognition();

      try {
        recognition.start();
      } catch (error) {
        setStatus('マイクを開始できませんでした。ページを再読み込みしてもう一度試してください。', true);
      }
    }

    function stopMic() {
      running = false;
      flushPendingText(true);
      if (recognition) recognition.stop();
    }

    startButton.addEventListener('click', () => {
      if (running) {
        stopMic();
      } else {
        startMic();
      }
    });

    historyOldestButton.addEventListener('click', () => {
      historyOrder = 'oldest';
      renderSentHistory();
    });

    historyNewestButton.addEventListener('click', () => {
      historyOrder = 'newest';
      renderSentHistory();
    });

    window.addEventListener('beforeunload', () => {
      flushPendingText(true);
    });

    renderSentHistory();
  </script>
</body>
</html>
