<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>つたえる君 外部マイク</title>
  <style>
    :root {
      --bg: #f3fffb;
      --panel: #ffffff;
      --text: #153634;
      --muted: #5f7d78;
      --main: #20b4a6;
      --main-dark: #0f8f85;
      --line: #a8ede4;
      --danger: #d84d61;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #eafff7, #f7fbff);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
    }

    main {
      width: min(960px, 100%);
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 24px 80px rgba(31, 145, 130, 0.16);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.7rem, 5vw, 3rem);
      line-height: 1.1;
    }

    p {
      color: var(--muted);
      line-height: 1.8;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      border-radius: 999px;
      background: #e8fbf8;
      color: var(--main-dark);
      padding: 8px 16px;
      font-weight: 800;
      margin: 16px 0;
    }

    .status.is-error {
      background: #fff0f3;
      color: var(--danger);
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 16px 0 20px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
    }

    .main-button {
      background: var(--main);
      color: #fff;
      box-shadow: 0 12px 32px rgba(32, 180, 166, 0.26);
    }

    .sub-button {
      background: #eefcf9;
      color: var(--main-dark);
      border: 1px solid var(--line);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0;
    }

    .meta div {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: #fbfffe;
    }

    .meta small {
      display: block;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 4px;
    }

    textarea {
      width: 100%;
      min-height: 42vh;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      font-size: 1.18rem;
      line-height: 1.9;
      color: var(--text);
      background: #fff;
    }

    .pending {
      margin-top: 12px;
      padding: 12px 14px;
      border: 1px dashed var(--line);
      border-radius: 16px;
      color: var(--muted);
      background: #fbfffe;
      line-height: 1.7;
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      main {
        padding: 18px;
        border-radius: 18px;
      }

      .meta {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>つたえる君 外部マイク</h1>
    <p>このページはGoogle Chromeの音声認識を使い、授業の音声を本体アプリへ送ります。マイク開始を押して、授業中はこのタブを開いたままにしてください。</p>

    <div class="meta">
      <div>
        <small>ルームID</small>
        <strong id="room-id-label">未設定</strong>
      </div>
      <div>
        <small>教科</small>
        <strong id="subject-label">math</strong>
      </div>
      <div>
        <small>送信</small>
        <strong id="sent-count-label">0件</strong>
      </div>
    </div>

    <div class="controls">
      <button class="main-button" type="button" id="start-button">マイク開始</button>
      <button class="sub-button" type="button" id="stop-button" disabled>停止</button>
      <button class="sub-button" type="button" id="flush-button">今の内容を送信</button>
    </div>

    <div class="status" id="status">停止中</div>
    <textarea id="text" placeholder="ここに音声認識された内容が入ります。"></textarea>
    <div class="pending" id="pending">送信待ちの内容はありません。</div>
  </main>

  <script>
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzBSH540vZK4G62twUfsketq9Pi2RZFocmfcNFwdEVV-IPqHH1Izb0VAFW_SRtN4nbf/exec';
    const LESSON_MIC_IDLE_STATUS_MS = 4500;
    const LESSON_MIC_CHUNK_SENTENCE_COUNT = 3;
    const LESSON_MIC_MIN_CHARS = 2;
    const KOTOBA_MIC_CORRECTIONS = [
      [/おはようございません/g, 'おはようございます'],
      [/前回の復讐/g, '前回の復習'],
      [/復讐/g, '復習'],
      [/副習/g, '復習'],
      [/とあ同士/g, '隣の人同士'],
      [/問あ同士/g, '隣の人同士'],
      [/となり同士/g, '隣同士'],
      [/となりどうし/g, '隣同士'],
      [/隣どうし/g, '隣同士'],
      [/隣の人どうし/g, '隣の人同士'],
      [/隣の人と同士/g, '隣の人同士'],
      [/隣でどうし復習/g, '隣同士で復習'],
      [/隣でどうし/g, '隣同士で'],
      [/同士で前回やった復習/g, '隣同士で前回やった復習'],
      [/お隣の人/g, '隣の人'],
      [/話しあい/g, '話し合い'],
      [/発表しあい/g, '発表し合い'],
      [/発表し合いましょうさぁ/g, '発表し合いましょう。さぁ'],
      [/話し合いましょうさぁ/g, '話し合いましょう。さぁ'],
      [/始めましょう隣/g, '始めましょう。隣'],
      [/しましょうさぁ/g, 'しましょう。さぁ'],
      [/くださいさぁ/g, 'ください。さぁ'],
      [/くださいさて/g, 'ください。さて'],
      [/くださいでは/g, 'ください。では'],
      [/ましょうさて/g, 'ましょう。さて'],
      [/ましょうでは/g, 'ましょう。では'],
      [/ですさて/g, 'です。さて'],
      [/ですでは/g, 'です。では'],
      [/ますさて/g, 'ます。さて'],
      [/ますでは/g, 'ます。では'],
      [/さぁ時間/g, 'さぁ、時間'],
      [/さぁ5つ/g, 'さぁ、5つ'],
      [/さあ時間/g, 'さぁ、時間'],
      [/そしてそして/g, 'そして'],
      [/それではでは/g, 'それでは'],
      [/鳥の子/g, '問いの5'],
      [/鳥の5/g, '問いの5'],
      [/問の子/g, '問いの5'],
      [/土肥の/g, '問いの'],
      [/問いの子/g, '問いの5'],
      [/トイレの([0-9０-９]+)/g, '問いの$1'],
      [/トイレ/g, '問い'],
      [/遠いのに/g, '問いの2'],
      [/遠いの([0-9０-９]+)/g, '問いの$1'],
      [/遠いの/g, '問いの'],
      [/問題の一/g, '問題の1'],
      [/問題の二/g, '問題の2'],
      [/問題の三/g, '問題の3'],
      [/問題の四/g, '問題の4'],
      [/問題の五/g, '問題の5'],
      [/溶けた人/g, '解けた人'],
      [/溶けたら/g, '解けたら'],
      [/溶けた/g, '解けた'],
      [/溶ける/g, '解ける'],
      [/解けますた/g, '解けました'],
      [/溶きましょう/g, '解きましょう'],
      [/溶いて/g, '解いて'],
      [/溶く/g, '解く'],
      [/先生に店に来て/g, '先生に見せに来て'],
      [/問題もの丸つけ/g, '問題も丸つけ'],
      [/黒板から左側/g, '黒板に向かって左側'],
      [/黒板の左側/g, '黒板に向かって左側'],
      [/黒板から右側/g, '黒板に向かって右側'],
      [/黒板の右側/g, '黒板に向かって右側'],
      [/黒板に向って/g, '黒板に向かって'],
      [/共通因数が取れない/g, '共通因数でくくれない'],
      [/共通因数で括れない/g, '共通因数でくくれない'],
      [/共通因数でくれる/g, '共通因数でくくれる'],
      [/共通因数でくれない/g, '共通因数でくくれない'],
      [/共通員数/g, '共通因数'],
      [/共通因子/g, '共通因数'],
      [/因数分会/g, '因数分解'],
      [/印数分解/g, '因数分解'],
      [/因数分かい/g, '因数分解'],
      [/展開公式/g, '展開の公式'],
      [/平方根号/g, '根号'],
      [/平方婚/g, '平方根'],
      [/平方今/g, '平方根'],
      [/1時\s*間数/g, '一次関数'],
      [/1時間数/g, '一次関数'],
      [/一時間数/g, '一次関数'],
      [/一次感数/g, '一次関数'],
      [/1時間進む内容/g, '一次関数の内容'],
      [/1時間数内容/g, '一次関数の内容'],
      [/二次感数/g, '二次関数'],
      [/どんな少数/g, 'どんな小数'],
      [/少数だった/g, '小数だった'],
      [/少数第/g, '小数第'],
      [/絶対地/g, '絶対値'],
      [/絶対知/g, '絶対値'],
      [/対象移動/g, '対称移動'],
      [/対象の軸/g, '対称の軸'],
      [/照明/g, '証明'],
      [/代乳/g, '代入'],
      [/台入/g, '代入'],
      [/角率/g, '確率'],
      [/相地/g, '相似'],
      [/総時/g, '相似'],
      [/号動/g, '合同'],
      [/変域/g, '範囲'],
      [/自分のプラス/g, '自分の力'],
      [/頭の中に入っていない/g, '理解できていない'],
      [/頭に入っていない/g, '理解できていない'],
      [/まず1つ目の確認をします/g, 'まず1つ目を確認します'],
      [/今日の目標は平方根の理解をしようです/g, '今日の目標は平方根を理解することです'],
      [/今日の目標は(.+?)の理解をしようです/g, '今日の目標は$1を理解することです'],
      [/理解をしようです/g, '理解することです'],
      [/√\s*([0-9０-９]+)と言うもの/g, '√$1というもの'],
      [/√\s*([0-9０-９]+)と言う/g, '√$1という'],
      [/についてどんな理解をしていますか√/g, 'についてどんな理解をしていますか。√'],
      [/√\s*([0-9０-９]+)\s*=\s*2乗して/g, '√$1は2乗して'],
      [/√\s*([0-9０-９]+)\s*は二乗して/g, '√$1は2乗して'],
      [/因数分解\s+1つは/g, '因数分解。1つは'],
      [/仕方1つは/g, '仕方。1つは'],
      [/場合の対応の仕方1つは/g, '場合の対応の仕方。1つは'],
      [/何個あげる/g, '何個挙げる'],
      [/何個あげられる/g, '何個挙げられる']
    ];

    const params = new URLSearchParams(location.search);
    const roomId = params.get('roomId') || '';
    const roomKey = params.get('roomKey') || '';
    const sessionId = params.get('sessionId') || '';
    const subject = params.get('subject') || 'math';

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const startButton = document.getElementById('start-button');
    const stopButton = document.getElementById('stop-button');
    const flushButton = document.getElementById('flush-button');
    const statusEl = document.getElementById('status');
    const textEl = document.getElementById('text');
    const pendingEl = document.getElementById('pending');
    const sentCountEl = document.getElementById('sent-count-label');

    let recognition = null;
    let running = false;
    let pendingText = '';
    let silenceTimer = 0;
    let sentCount = 0;

    document.getElementById('room-id-label').textContent = roomId || '未設定';
    document.getElementById('subject-label').textContent = subject;

    function setStatus(message, isError) {
      statusEl.textContent = message;
      statusEl.classList.toggle('is-error', Boolean(isError));
    }

    function normalizeText(value) {
      return String(value || '')
        .replace(/[\u00a0\u3000]/g, ' ')
        .replace(/\s+/g, ' ')
        .replace(/([ぁ-んァ-ヶ一-龠々ー])\s+(?=[ぁ-んァ-ヶ一-龠々ー])/g, '$1')
        .replace(/([ぁ-んァ-ヶ一-龠々ー])\s+(?=[、。！？!?])/g, '$1')
        .replace(/([、。！？!?])\s+(?=[ぁ-んァ-ヶ一-龠々ー])/g, '$1')
        .trim();
    }

    function applyMicCorrectionRules(text) {
      return KOTOBA_MIC_CORRECTIONS.reduce((current, rule) => {
        return current.replace(rule[0], rule[1]);
      }, String(text || ''));
    }

    function normalizeLessonMathText(text) {
      const safeText = normalizeText(text);
      if (!safeText) return '';

      return applyMicCorrectionRules(safeText)
        .replace(/ルート\s*([0-9０-９]+)/g, '√$1')
        .replace(/√\s*([0-9０-９]+)/g, '√$1')
        .replace(/[（(]\s*[xX]\s*[+＋]\s*([A-Za-zＡ-Ｚａ-ｚ])\s*[）)]?\s*[（(]\s*[xX]\s*[+＋]\s*([A-Za-zＡ-Ｚａ-ｚ])\s*[）)]/g, '(x+$1)(x+$2)')
        .replace(/[（(]\s*[xX]\s*[+＋]\s*([A-Za-zＡ-Ｚａ-ｚ])\s+[（(]\s*[xX]\s*[+＋]\s*([A-Za-zＡ-Ｚａ-ｚ])(?=の|を|で|、|。|$)/g, '(x+$1)(x+$2)')
        .replace(/[（(]\s*[xX]\s*[+＋]\s*([A-Za-zＡ-Ｚａ-ｚ])\s*(?:の)?2乗/g, '(x+$1)の2乗')
        .replace(/[xX]\s*[+＋]\s*([A-Za-zＡ-Ｚａ-ｚ])/g, 'x+$1')
        .replace(/\s*([＋+＝=×÷])\s*/g, '$1')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function prepareJapaneseForLessonText(text) {
      const safeText = normalizeText(text);
      if (!safeText) return '';

      return safeText
        .replace(/(こんにちは|おはようございます|こんばんは)(?=(これから|さて|では|それでは|まず|次に|続いて|最後に|教科書|ノート|黒板|復習問題|問い|問|問題))/g, '$1。')
        .replace(/(してください)(?=(では|それでは|さて|まず|次に|続いて|最後に|教科書|ノート|黒板|隣|先生|答え|復習問題|問い|問|問題|解けた人|早くも|全部|何の|何を|何が))/g, '$1。')
        .replace(/(しましょう|ましょう)(?=(では|それでは|さて|まず|次に|続いて|最後に|教科書|ノート|黒板|隣|先生|答え|復習問題|問い|問|問題|解けた人|早くも|全部))/g, '$1。')
        .replace(/(確認します|発表します|始めます|行います|解きます|ときます)(?=(こんにちは|では|それでは|さて|まず|次に|続いて|最後に|教科書|ノート|黒板|隣|先生|かっこ|問題|復習問題|問い|問|答え|解けた人|早くも|全部))/g, '$1。')
        .replace(/(開きましょう|まとめてみましょう|話し合ってください|見合ってください|見せに来ましょう|持ってきましょう|見せに来てください)(?=(では|それでは|さて|まず|次に|続いて|最後に|教科書|ノート|黒板|隣|先生|前回|今日|復習問題|問い|問|答え|早くも|全部))/g, '$1。')
        .replace(/(欲しいです|いますね|でしょうか|ましたか|できましたか)(?=(では|それでは|さて|まず|次に|続いて|最後に|先生|解けた人|復習問題|問い|問|答え|早くも|全部|指|何の|何を|何が))/g, '$1。')
        .replace(/(教科書を閉じて)(?=(今|今日|まず|次に|隣))/g, '$1。')
        .replace(/([。！？!?])(?=(こんにちは|では|それでは|さて|まず|次に|続いて|最後に|教科書|ノート|黒板|隣|先生|復習問題|問い|問|答え|問題|早くも|全部))/g, '$1 ')
        .replace(/(1つは|一つは|もう一つは|もう1つは)(?=\S)/g, '$1 ')
        .replace(/([0-9０-９]+)\s*ページ/g, '$1ページ')
        .replace(/([0-9０-９]+)\s*分/g, '$1分')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function prepareSpeechTextForLessonChunk(value) {
      return prepareJapaneseForLessonText(normalizeLessonMathText(value))
        .replace(/[、,]+$/g, '')
        .replace(/^(こんにちは|おはようございます|こんばんは)(?=[ぁ-んァ-ヶ一-龠々ー])/g, '$1。')
        .replace(/(ますか|ましたか|ですか|でしょうか|ます|ました|です|でした|ください|ましょう|でしょう|開きましょう|始めます|行います|解きます|ときます|欲しいです|持ってきましょう|見せに来てください)(?=(こんにちは|これから|さて|では|それでは|まず|次に|続いて|最後に|先ほど|前回|今日|教科書|ノート|頭の中|隣|黒板|時間|みんな|自分|整理|確認|問題|答え|ポイント|かっこ|復習問題|問い|問|途中|先生|解けた人|早くも|全部|指|何の|何を|何が))/g, '$1。')
        .replace(/(ください|ましょう|ます|ました|です|でした|いますね)(?=(もし|できれば|できた人|分からない|終わった人|解けた人|先生に|並んでいる|お友達|早くも|全部|何の|何を|何が))/g, '$1。')
        .replace(/(さて|では|それでは)(?=(教科書|復習問題|問い|問|答え|解けた人|先生))/g, '$1、')
        .replace(/([！？!?])(?=[ぁ-んァ-ヶ一-龠々ー])/g, '$1。')
        .replace(/。+/g, '。')
        .trim();
    }

    function countLessonSentences(value) {
      const text = normalizeText(value);
      const matches = text.match(/[。！？!?]/g);
      return matches ? matches.length : 0;
    }

    function takeLessonSentenceChunk(value, count) {
      const text = normalizeText(value);
      let seen = 0;

      for (let index = 0; index < text.length; index += 1) {
        if (/[。！？!?]/.test(text.charAt(index))) {
          seen += 1;
          if (seen >= count) {
            return {
              chunk: text.slice(0, index + 1).trim(),
              rest: text.slice(index + 1).trim()
            };
          }
        }
      }

      return {
        chunk: '',
        rest: text
      };
    }

    function appendVisibleText(text) {
      const safeText = normalizeText(text);
      if (!safeText) return;
      textEl.value = normalizeText((textEl.value ? textEl.value + '\n' : '') + safeText);
      textEl.scrollTop = textEl.scrollHeight;
    }

    function updatePendingView() {
      pendingEl.textContent = pendingText
        ? 'GAS側で確定待ち: ' + pendingText
        : 'GAS側で3つ分たまると授業ログとして確定します。';
    }

    function scheduleSilenceFlush() {
      clearTimeout(silenceTimer);
      silenceTimer = setTimeout(() => {
        setStatus('音声入力中です。3つ分たまると授業ログに確定します。', false);
      }, LESSON_MIC_IDLE_STATUS_MS);
    }

    function addPendingText(text) {
      const safeText = prepareSpeechTextForLessonChunk(text);
      if (!safeText) return;

      pendingText = normalizeText((pendingText ? pendingText + ' / ' : '') + safeText);
      updatePendingView();
      sendLessonText(safeText, false);
      updatePendingView();
      scheduleSilenceFlush();
    }

    function flushPendingText(force) {
      if (!force) {
        return;
      }

      pendingText = '';
      updatePendingView();
      clearTimeout(silenceTimer);
      sendLessonText('', true);
    }

    function sendLessonText(text, force) {
      const body = new URLSearchParams();
      body.set('action', 'appendLessonMicLog');
      body.set('roomId', roomId);
      body.set('roomKey', roomKey);
      body.set('sessionId', sessionId);
      body.set('subject', subject);
      body.set('jaText', text);
      body.set('force', force ? '1' : '0');

      if (!text && !force) return;

      fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors',
        keepalive: true,
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
        },
        body
      });

      if (text) {
        sentCount += 1;
        sentCountEl.textContent = sentCount + '件';
        setStatus('GASへ送りました。3つ分で授業ログに確定します。', false);
      } else if (force) {
        setStatus('残りの音声を授業ログに確定します。', false);
      }
    }

    function createRecognition() {
      const rec = new SpeechRecognition();
      rec.lang = 'ja-JP';
      rec.continuous = true;
      rec.interimResults = false;

      rec.onstart = () => {
        running = true;
        startButton.disabled = true;
        stopButton.disabled = false;
        setStatus('マイク入力中です。', false);
      };

      rec.onresult = (event) => {
        for (let i = event.resultIndex; i < event.results.length; i += 1) {
          if (!event.results[i].isFinal) continue;
          const transcript = prepareSpeechTextForLessonChunk(event.results[i][0].transcript);
          appendVisibleText(transcript);
          addPendingText(transcript);
        }
      };

      rec.onerror = (event) => {
        setStatus('音声認識で問題が起きました: ' + (event.error || 'unknown'), true);
      };

      rec.onend = () => {
        const shouldRestart = running;
        if (shouldRestart) {
          setTimeout(() => {
            try {
              rec.start();
            } catch (error) {
              setStatus('マイクの再開に失敗しました。もう一度マイク開始を押してください。', true);
              running = false;
              startButton.disabled = false;
              stopButton.disabled = true;
            }
          }, 400);
          return;
        }

        startButton.disabled = false;
        stopButton.disabled = true;
        setStatus('停止中', false);
      };

      return rec;
    }

    startButton.addEventListener('click', () => {
      if (!SpeechRecognition) {
        setStatus('このブラウザは音声認識に対応していません。Google Chromeで開いてください。', true);
        return;
      }

      if (!roomId || !roomKey || !sessionId) {
        setStatus('ルーム情報がありません。本体アプリの授業モードから開いてください。', true);
        return;
      }

      recognition = recognition || createRecognition();

      try {
        recognition.start();
      } catch (error) {
        setStatus('マイクを開始できませんでした。ページを再読み込みしてもう一度試してください。', true);
      }
    });

    stopButton.addEventListener('click', () => {
      running = false;
      flushPendingText(true);
      if (recognition) recognition.stop();
    });

    flushButton.addEventListener('click', () => {
      flushPendingText(true);
    });

    window.addEventListener('beforeunload', () => {
      flushPendingText(true);
    });
  </script>
</body>
</html>
